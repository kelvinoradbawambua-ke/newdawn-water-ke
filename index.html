  // Local-timezone-safe YYYY-MM-DD — NEVER use toISOString() for this,
  // it converts to UTC and silently shifts the date near midnight in
  // any timezone ahead of UTC (e.g. East Africa Time, UTC+3).
  var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");
  return y+"-"+m+"-"+dd;
}

function custDebt(id){
  var cu=(D.customers||[]).find(function(x){return x.id===id;});
  var credit=(cu&&cu.credit>0)?cu.credit:0;
  var gross=(D.invoices||[]).filter(function(i){
    if(i.cId!==id)return false;
    if(i.paid>=i.amount)return false; // fully paid, no debt
    if(i.voided)return false; // voided/written-off — excluded from debt
    // Check if linked to a cancelled or deleted order
    if(i.notes&&i.notes.indexOf("#")!==-1){
      var match=i.notes.match(/#(\d+)/);
      if(match){
        var oid=parseInt(match[1]);
        var o=(D.orders||[]).find(function(x){return x.id===oid;});
        if(!o||o.status==="Cancelled")return false; // order gone or cancelled
      }
    }
    return true;
  }).reduce(function(a,i){return a+(i.amount-i.paid);},0);
  return Math.max(0,gross-credit); // net debt after credit
}

var AUDIT_HOT_MAX=200; // entries kept live in main Firestore doc
var AUDIT_ARCHIVE_THRESHOLD=180; // archive when hot log hits this
function auditLog(action,details){
  // Use CU (logged-in user) or SU (selected but not yet verified) for pre-login events
  var actor=CU||SU;
  if(!actor)return;
  var _clientId=Date.now()+"-"+Math.random().toString(36).slice(2,9); // stable ID for idempotent retries
  var entry={
    _cid:_clientId,
    ts:new Date().toISOString(),
    user:actor.name,
    role:actor.role,
    uid:actor.id,
    action:action,
    details:details||""
  };
  // Write to Firestore subcollection — queue if not yet ready
  if(FB_EVENTS_COL&&FB_READY){
    FB_EVENTS_COL.doc(_clientId).set(entry).catch(function(err){
      // Retry: queue failed audit writes for re-attempt
      if(!window._auditFailQ)window._auditFailQ=[];
      window._auditFailQ.push(entry);
      var msg=err&&err.message?err.message:(err&&err.code?err.code:"unknown");
      if(CU&&CU.role==="director")toast("Audit write queued for retry: "+msg,"ok");
    });
  }else if(FB_EVENTS_COL&&!FB_READY){
    // Queue events fired before Firestore is ready — flush on connection
    if(!window._auditQueue)window._auditQueue=[];
    window._auditQueue.push(entry);
  }
  // Keep local cache for immediate display
  if(!D.auditLog)D.auditLog=[];
  (D.auditLog||[]).push(entry);
  if((D.auditLog||[]).length>AUDIT_HOT_MAX)D.auditLog=D.auditLog.slice(-AUDIT_HOT_MAX);
  // Refresh audit view immediately if visible — don't wait for Firestore roundtrip
  try{
    var _ap=document.getElementById("pg-excel");
    if(_ap&&_ap.classList.contains("act"))rAuditLog();
  }catch(e){}
}
function archiveAuditLogs(){
  if(!D.auditLog||(D.auditLog||[]).length<AUDIT_ARCHIVE_THRESHOLD)return;
  // Only archive when online — never drop entries without confirming write
  if(!FB_READY||!FB_BACKUP_COL)return;
  var toArchive=(D.auditLog||[]).slice(0,AUDIT_ARCHIVE_THRESHOLD);
  var archiveId="auditlog-"+new Date().toISOString().replace(/[:.]/g,"-").slice(0,19);
  FB_BACKUP_COL.doc(archiveId).set({
    type:"audit_archive",
    archivedAt:new Date().toISOString(),
    archivedBy:CU?CU.name:"system",
    entries:toArchive,
    count:toArchive.length
  }).catch(function(){});
  // Prune audit archives older than 90 days (free tier storage management)
  pruneAuditArchives();
}
var _lastAuditPrune=0;
function pruneAuditArchives(){
  // Only prune once per hour per session — prevents excess reads
  var now=Date.now();
  if(now-_lastAuditPrune<3600000)return;
  _lastAuditPrune=now;
  if(!FB_EVENTS_COL||!FB_READY)return;
  var cutoff=new Date();
  cutoff.setDate(cutoff.getDate()-90);
  var cutoffTs=cutoff.toISOString();
  // Single-field query — no composite index needed
  FB_EVENTS_COL
    .orderBy("ts","asc")
    .endBefore(cutoffTs)
    .limit(30)
    .get().then(function(snap){
      if(snap.empty)return;
      snap.forEach(function(d){d.ref.delete().catch(function(){});});
    }).catch(function(){});
}
function loadAuditArchives(cb){
  // Load archived audit logs for display in the viewer
  if(!FB_BACKUP_COL){if(cb)cb([]);return;}
  FB_BACKUP_COL
    .where(firebase.firestore.FieldPath.documentId(),">=","auditlog-")
    .where(firebase.firestore.FieldPath.documentId(),"<","auditlog-z")
    .orderBy(firebase.firestore.FieldPath.documentId(),"desc")
    .limit(10)
    .get().then(function(snap){
      var all=[];
      snap.forEach(function(d){
        var data=d.data();
        if(data&&data.entries)all=all.concat(data.entries);
      });

      all.sort(function(a,b){return b.ts>a.ts?1:-1;});
      if(cb)cb(all);
    }).catch(function(){if(cb)cb([]);});

function manualPurgeAuditLog(daysOld){

  if(!can("exp")){toast("Director only","err");return;}
  if(!D.auditLog||!(D.auditLog||[]).length){toast("Audit log is already empty");return;}

  cutoff.setDate(cutoff.getDate()-daysOld);

/* ── LIVE CLOUD SYNC ENGINE ── */
function scheduleCloudSync(){
  if(!FB_READY)return;
  if(FB_SYNC_TIMER)clearTimeout(FB_SYNC_TIMER);
  FB_SYNC_TIMER=setTimeout(pushToCloud,800);
}
function pushToCloud(){
  if(!FB_READY||!FB_DOC_REF)return;
  var isEmpty=(!D.customers||(D.customers||[]).length===0)&&(!D.orders||(D.orders||[]).length===0)&&(!D.stock||(D.stock||[]).length===0);
  if(isEmpty&&FB_SETUP_DONE)return; // empty data guard — silently skip
  // Queue the write — process one at a time to prevent race conditions
  FB_WRITE_QUEUE.push(Date.now());
  if(!FB_WRITING)processWriteQueue();
}
function processWriteQueue(){
  if(!FB_WRITE_QUEUE.length){FB_WRITING=false;return;}
  if(!D||typeof D!=="object"){FB_WRITING=false;return;} // safety: never write null data
  FB_WRITING=true;
  FB_WRITE_QUEUE=[];// collapse multiple pending writes into one
  FB_LAST_LOCAL_WRITE=Date.now();
  // Strip auditLog and keep only recent orders/invoices to control doc size
  var DforSync={};
  var keys=Object.keys(D);
  for(var ki=0;ki<keys.length;ki++){
    if(keys[ki]==="_ts")continue; // internal timestamp — not persisted
    if(keys[ki]==="auditLog"){
      // Last 20 audit entries in main doc — guaranteed cross-device fallback
      DforSync.auditLog=(D.auditLog||[]).slice(-20);
      continue;
    }
    DforSync[keys[ki]]=D[keys[ki]];
  }
  // Doc size guard: trim delivered orders older than 6 months from sync payload
  // Data stays in D (in-memory + localStorage); only Firestore doc is trimmed
  var sixMonthsAgo=new Date();sixMonthsAgo.setMonth(sixMonthsAgo.getMonth()-6);
  var cutoffDate=sixMonthsAgo.toISOString().split("T")[0];
  if(DforSync.orders&&DforSync.orders.length>500){
    // Keep all non-delivered + recent delivered; archive old delivered to backup
    DforSync.orders=DforSync.orders.filter(function(o){
      return o.status!=="Delivered"||(o.deliveredAt||o.date)>=cutoffDate;
    });
  }
  if(DforSync.invoices&&DforSync.invoices.length>500){
    // Keep unpaid + recent paid invoices
    DforSync.invoices=DforSync.invoices.filter(function(i){
      return i.paid<i.amount||i.date>=cutoffDate;
    });
  }
  var payload={
    D:DforSync,USERS:USERS,nOId:nOId,nIId:nIId,nCId:nCId,
    setupDone:FB_SETUP_DONE,
    updatedAt:FB_LAST_LOCAL_WRITE
  };
  // Estimate document size — warn director before hitting 1MB Firestore limit
  try{
    var _payloadStr=JSON.stringify(payload);
    var _sizeKB=Math.round(_payloadStr.length/1024);
    if(_sizeKB>800){toast("⚠️ Data near Firestore limit ("+_sizeKB+"KB/1000KB). Export a backup and ask your tech team to archive old orders.","warn");}
  }catch(e){}
  FB_DOC_REF.set(JSON.parse(JSON.stringify(payload)),{merge:true}).then(function(){
    FB_WRITING=false;
    var e=el("sts");if(e){e.className="sts saved";e.innerHTML="<i class=\"ti ti-cloud-check\"></i> Synced "+new Date().toLocaleTimeString();}
    var cs=el("cloud-status");
    var custN=(D&&D.customers&&(D.customers||[]).length)||0;
    if(cs)cs.innerHTML="<span style=\"display:inline-block;width:7px;height:7px;background:#27ae60;border-radius:50%;margin-right:5px;animation:pulse 2s infinite\"></span>Live"+(custN>0?" &middot; "+custN+" customers":"");
    // Process any writes that came in while we were writing
    if(FB_WRITE_QUEUE.length)processWriteQueue();
  }).catch(function(err){
    FB_WRITING=false;
    var e=el("sts");if(e){e.className="sts dirty";e.innerHTML="<i class=\"ti ti-cloud-off\"></i> Sync failed - retrying";}
    setTimeout(pushToCloud,5000);
  });
}
/* ══════════════════════════════════════════════════════════
   AUTOMATIC BACKUP ENGINE
   - Hourly snapshot → Firestore /newdawn_backups/hourly-YYYY-MM-DD-HH
   - Daily snapshot  → Firestore /newdawn_backups/daily-YYYY-MM-DD
   - Keeps last 30 daily + 24 hourly (auto-prunes old ones)
   - Auto-restores if main doc is wiped
   - Zero manual steps, zero cost, forever free
   ══════════════════════════════════════════════════════════ */
function getBackupPayload(){
  return {
    D:D,USERS:USERS,nOId:nOId,nIId:nIId,nCId:nCId,
    setupDone:FB_SETUP_DONE,
    backedUpAt:Date.now(),
    stats:{
      customers:(D.customers||[]).length,
      orders:(D.orders||[]).length,
      stock:(D.stock||[]).length,
      invoices:(D.invoices||[]).length
    }
  };
}
function writeBackup(docId){
  if(!FB_BACKUP_COL)return;
  var isEmpty=(!D.customers||(D.customers||[]).length===0)&&(!D.orders||(D.orders||[]).length===0);
  if(isEmpty&&FB_SETUP_DONE)return; // never backup empty data
  try{
    var payload=JSON.parse(JSON.stringify(getBackupPayload()));
    FB_BACKUP_COL.doc(docId).set(payload).then(function(){
      // Stamp completion in main doc so all devices know a backup happened
      if(docId.indexOf("daily-")===0&&FB_DOC_REF){
        D._lastDailyBackup=tday();
        FB_DOC_REF.set({_lastDailyBackup:tday()},{merge:true}).catch(function(){});
      }
    }).catch(function(e){
      /* backup write failed silently */
    });
  }catch(e){/* backup error silently */}
}
function pruneOldBackups(prefix,keepCount){
  if(!FB_BACKUP_COL)return;
  // Bound reads to keepCount+5 — we only need to see slightly beyond the keep window
  FB_BACKUP_COL.where(firebase.firestore.FieldPath.documentId(),">=",prefix)
    .where(firebase.firestore.FieldPath.documentId(),"<",prefix.slice(0,-1)+String.fromCharCode(prefix.charCodeAt(prefix.length-1)+1))
    .orderBy(firebase.firestore.FieldPath.documentId(),"desc")
    .limit(keepCount+5)
    .get().then(function(snap){
      var docs=[];
      snap.forEach(function(d){docs.push(d.id);});
      docs.slice(keepCount).forEach(function(id){
        FB_BACKUP_COL.doc(id).delete().catch(function(){});
      });
    }).catch(function(){});
}
function runAutoBackup(){
  if(!CU||CU.role!=="director")return; // backups director-only
  if(!FB_READY||!FB_BACKUP_COL)return;
  var isEmpty=(!D.customers||(D.customers||[]).length===0)&&(!D.orders||(D.orders||[]).length===0);
  if(isEmpty)return;
  var now=new Date();
  var dateStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
  var hourStr=dateStr+"-"+String(now.getHours()).padStart(2,"0");
  var nowMs=Date.now();
  // Hourly backup — every 60 minutes
  if(nowMs-FB_LAST_HOURLY>60*60*1000){
    FB_LAST_HOURLY=nowMs;
    writeBackup("hourly-"+hourStr);
    pruneOldBackups("hourly-",24);
  }
  // Daily backup — once per day
  if(nowMs-FB_LAST_DAILY>24*60*60*1000){
    FB_LAST_DAILY=nowMs;
    writeBackup("daily-"+dateStr);
    pruneOldBackups("daily-",14); // 14 daily backups = 2 weeks coverage
  }
}
function startAutoBackup(){
  // Backups only meaningful for director (has full data access)
  if(!CU||CU.role!=="director")return;
  // Run immediately after login, then every 10 minutes check if backup needed
  setTimeout(runAutoBackup,10000);
  if(FB_BACKUP_TIMER)clearInterval(FB_BACKUP_TIMER);
  FB_BACKUP_TIMER=setInterval(function(){
    runAutoBackup();
    autoSaveLocal(); // belt-and-suspenders: also refresh local copy every 10 min
  },10*60*1000);
}
function restoreFromLatestBackup(onSuccess,onFail){
  if(!FB_BACKUP_COL){if(onFail)onFail("No backup collection");return;}
  // Try daily first, then hourly
  var attempts=["daily-","hourly-"];
  var ai=0;
  function tryNext(){
    if(ai>=attempts.length){if(onFail)onFail("No backups found");return;}
    var prefix=attempts[ai++];
    FB_BACKUP_COL
      .orderBy(firebase.firestore.FieldPath.documentId(),"desc")
      .limit(1)
      .get().then(function(snap){
        if(snap.empty){tryNext();return;}
        var best=null;
        snap.forEach(function(d){
          var data=d.data();
          if(data&&data.D&&((data.D.customers&&data.D.customers.length>0)||(data.D.orders&&data.D.orders.length>0))){
            if(!best||data.backedUpAt>(best.backedUpAt||0))best=data;
          }
        });
        if(best){
          D=best.D;
          if(!D.routes)D.routes=[];
          if(!D.complaints)D.complaints=[];
          if(!D.offers)D.offers=[];
          if(best.USERS&&(best.USERS||[]).length)USERS=best.USERS;
          nOId=best.nOId||nOId;nIId=best.nIId||nIId;nCId=best.nCId||nCId;
          FB_SETUP_DONE=true;
          syncIdCounters();
          syncPaymentStatuses();
          // Merge hot audit log from localStorage (auditLog not in main doc)
          var snap=autoSaveCheckLocal();
          if(snap&&snap.D&&snap.D.auditLog&&(snap.D.auditLog||[]).length>0){
            if(!D.auditLog)D.auditLog=[];
            var existTs={};
            (D.auditLog||[]).forEach(function(e){existTs[e.ts]=true;});
            (snap.D.auditLog||[]).forEach(function(e){if(!existTs[e.ts])(D.auditLog||[]).push(e);});
          }
          if(onSuccess)onSuccess(best);
        }else{tryNext();}
      }).catch(function(){tryNext();});
  }
  tryNext();
}
var FB_AUDIT_UNSUB=null;
function _mergeAuditEvents(remote){
  // Flush any previously-failed audit writes now connection is confirmed good
  if(window._auditFailQ&&window._auditFailQ.length&&FB_EVENTS_COL){
    var fq=window._auditFailQ.splice(0);
    fq.forEach(function(e){var _id=e._cid||(e.ts+"-"+Math.random().toString(36).slice(2,9));FB_EVENTS_COL.doc(_id).set(e).catch(function(){window._auditFailQ.push(e);});});
  }
  // Core merge — used by both listener and one-time load
  // NEVER replaces D.auditLog — only adds new entries
  if(!remote||!remote.length)return;
  if(!D.auditLog)D.auditLog=[];
  var existing={};
  (D.auditLog||[]).forEach(function(e){if(e.ts)existing[e.ts]=true;});
  var added=0;
  remote.forEach(function(e){
    if(e.ts&&!existing[e.ts]){(D.auditLog||[]).push(e);existing[e.ts]=true;added++;}
  });
  if(added>0){
    (D.auditLog||[]).sort(function(a,b){return a.ts<b.ts?-1:a.ts>b.ts?1:0;});
    if((D.auditLog||[]).length>AUDIT_HOT_MAX)D.auditLog=(D.auditLog||[]).slice(-AUDIT_HOT_MAX);
    var pg=document.getElementById("pg-excel");
    if(pg&&pg.classList.contains("act"))rAuditLog();
  }
}
function startAuditListener(){

/* ── PIN LOCKOUT — rate limiting, no system effect ── */
var PIN_ATTEMPTS={};   // {userId: {count, lockedUntil}}
var PIN_MAX=5;         // attempts before lockout
var PIN_LOCKOUT=30;    // seconds locked out
var PIN_RESET=300;     // seconds before attempt counter resets (5 min)
function pinAttemptsKey(){return SU?'pin_atm_'+SU.id:null;}
function getPinState(){
  var key=pinAttemptsKey();if(!key)return{count:0,lockedUntil:0,lastAttempt:0};
  try{var raw=sessionStorage.getItem(key);return raw?JSON.parse(raw):{count:0,lockedUntil:0,lastAttempt:0};}catch(e){return{count:0,lockedUntil:0,lastAttempt:0};}
}
function setPinState(s){
  var key=pinAttemptsKey();if(!key)return;
  try{sessionStorage.setItem(key,JSON.stringify(s));}catch(e){}
}
function clearPinState(){
  var key=pinAttemptsKey();if(!key)return;
  try{sessionStorage.removeItem(key);}catch(e){}
}
function pinLockRemaining(){
  var s=getPinState();
  if(!s.lockedUntil)return 0;
  var rem=Math.ceil((s.lockedUntil-Date.now())/1000);
  return rem>0?rem:0;
}
function pk(k){
  if(k==="⌫"||k.charCodeAt(0)===9003){PE=PE.slice(0,-1);rDots();return;}
  if(PE.length>=4)return;
  // Check lockout
  var rem=pinLockRemaining();
  if(rem>0){
    el("perr").textContent="Too many attempts. Wait "+rem+"s.";
    PE="";rDots();return;
  }
  PE+=k;rDots();
  if(PE.length===4){
    if(PE===SU.pin){
      // Correct — clear lockout state and proceed
      clearPinState();
      el("perr").textContent="";
      CU=SU;
      checkAutoSaveRecovery();
    }else{
      // Wrong PIN — increment counter
      var s=getPinState();
      var now=Date.now();
      // Reset counter if last attempt was more than PIN_RESET seconds ago
      if(s.lastAttempt&&now-s.lastAttempt>PIN_RESET*1000){s.count=0;s.lockedUntil=0;}
      s.count=(s.count||0)+1;
      s.lastAttempt=now;
      if(s.count>=PIN_MAX){
        s.lockedUntil=now+PIN_LOCKOUT*1000;
        setPinState(s);
        el("perr").textContent="Too many wrong attempts. Locked for "+PIN_LOCKOUT+"s.";
        // Log lockout to audit so director sees it
        if(SU)auditLog("SECURITY_VIOLATION","PIN lockout: "+SU.name+" ("+SU.role+") exceeded "+PIN_MAX+" attempts — locked "+PIN_LOCKOUT+"s");
        // Start countdown display
        var countdown=setInterval(function(){
          var r=pinLockRemaining();
          if(r>0){el("perr").textContent="Too many wrong attempts. Locked for "+r+"s.";}
          else{clearInterval(countdown);el("perr").textContent="Enter your PIN.";}
        },1000);
      }else{
        setPinState(s);
        var left=PIN_MAX-s.count;
        el("perr").textContent="Incorrect PIN — "+left+" attempt"+(left===1?"":"s")+" remaining before lockout.";
      }
      PE="";setTimeout(rDots,350);
    }
  }
}
function checkAutoSaveRecovery(){
  // Always restore auditLog from localStorage first (it is never in Firestore)
  var _localSnap=autoSaveCheckLocal();
  if(_localSnap&&_localSnap.D&&_localSnap.D.auditLog&&(_localSnap.D.auditLog||[]).length){
    var _existing={};
    (D.auditLog||[]).forEach(function(e){if(e.ts)_existing[e.ts]=true;});
    if(!D.auditLog)D.auditLog=[];
    (_localSnap.D.auditLog||[]).forEach(function(e){
      if(e.ts&&!_existing[e.ts])(D.auditLog||[]).push(e);
    });
    (D.auditLog||[]).sort(function(a,b){return a.ts>b.ts?1:-1;});
  }
  // Non-director/manager roles: skip localStorage restore — trust Firestore
  if(!CU||( CU.role!=="director"&&CU.role!=="manager")){
    buildApp();
    return;
  }
  var snap=autoSaveCheckLocal();
  var hasCurrentData=(D.customers||[]).length||(D.orders||[]).length||(D.invoices||[]).length;
  if(snap&&snap.D){
    var snapHasData=(snap.D.customers&&(snap.D.customers||[]).length)||(snap.D.orders&&(snap.D.orders||[]).length);
    var snapCusts=(snap.D.customers||[]).length;
    var snapOrds=(snap.D.orders||[]).length;
    var currCusts=D.customers?(D.customers||[]).length:0;
    var currOrds=D.orders?(D.orders||[]).length:0;
    // NEVER consider a snapshot "better" if it has FEWER customers than live data —
    // customers are the foundational record; a higher order count in a stale local
    // snapshot must never be allowed to justify losing real customers added elsewhere.
    var snapIsBetter=!hasCurrentData||(snapCusts>=currCusts&&(snapCusts>currCusts+5||snapOrds>currOrds+10));
    // Check if local snapshot is more recent than Firestore
    var snapTs=snap.ts?new Date(snap.ts).getTime():0;
    var snapIsNewer=snapTs>0&&snapTs>Date.now()-30*60*1000; // within 30 min
    if(snapHasData&&snapIsBetter){
      // Director fast-path: if local is clearly better and very recent, auto-restore
      if(snapIsNewer&&snapCusts>currCusts+5){
        D=snap.D;
        if(!D.routes)D.routes=[];
        if(!D.complaints)D.complaints=[];
        if(!D.offers)D.offers=[];
        if(!D.auditLog)D.auditLog=[];
        if(!D.pendingPayments)D.pendingPayments=[];
        if(snap.USERS&&snap.USERS.length)USERS=snap.USERS;
        nOId=snap.nOId||nOId;nIId=snap.nIId||nIId;nCId=snap.nCId||nCId;
        FB_SETUP_DONE=snap.setupDone===true||FB_SETUP_DONE;
        syncIdCounters();syncPaymentStatuses();
        FB_LAST_LOCAL_WRITE=Date.now();
        setTimeout(function(){pushToCloud();},500);
        autoSaveLocal();
        toast("Local session auto-restored — "+snapCusts+" customers. Syncing...","ok");
      }else{
        // Ask director to confirm (older local data or smaller difference)
        var snapTime=snap.ts?new Date(snap.ts).toLocaleString():"earlier session";
        var msg="Found an auto-saved session from "+snapTime+" on this device with "+snapCusts+" customers and "+snapOrds+" orders.";
        if(hasCurrentData)msg+="\n\nLive cloud data currently has "+currCusts+" customers and "+currOrds+" orders.";
        msg+="\n\n\u26a0\ufe0f Restoring will REPLACE the live cloud data with this local snapshot.";
        msg+="\n\nRestore this data now?";
        if(confirm(msg)){
          D=snap.D;
          if(!D.routes)D.routes=[];
          if(!D.complaints)D.complaints=[];
          if(!D.offers)D.offers=[];
          if(!D.auditLog)D.auditLog=[];
          if(!D.pendingPayments)D.pendingPayments=[];
          if(snap.USERS&&snap.USERS.length)USERS=snap.USERS;
          nOId=snap.nOId||nOId;nIId=snap.nIId||nIId;nCId=snap.nCId||nCId;
          FB_SETUP_DONE=snap.setupDone===true||FB_SETUP_DONE;
          syncIdCounters();syncPaymentStatuses();
          FB_LAST_LOCAL_WRITE=Date.now();
          setTimeout(function(){pushToCloud();},500);
          autoSaveLocal();
          toast("Session restored — "+snapCusts+" customers. Syncing to all devices...","ok");
        }
      }
    }
  }
  buildApp();
}

    stock:WIZ_STOCK.slice(),
    orders:[],
    offers:[],
    invoices:[],
    routes:[],

  };

    USERS:finalUsers,
    nOId:1001,nIId:2001,nCId:3001,
    setupDone:true,
    updatedAt:Date.now()

  FB_DOC_REF.set(JSON.parse(JSON.stringify(cleanPayload)),{merge:false}).then(function(){

    D=freshD;
    USERS=finalUsers;
    nOId=1001;nIId=2001;nCId=3001;
    FB_SETUP_DONE=true;

function logout(){
  stopAutoSaveLoop();
  // Stop idle timer for ALL roles immediately
  stopIdleWatcher();
  // Cancel any pending cloud sync timer
  if(FB_SYNC_TIMER){clearTimeout(FB_SYNC_TIMER);FB_SYNC_TIMER=null;}
  // Clear write queue to prevent post-logout writes
  FB_WRITE_QUEUE=[];FB_WRITING=false;
  // Flush queued audit events before disconnecting
  if(FB_EVENTS_COL&&FB_READY){
    var aq=(window._auditQueue||[]).concat(window._auditFailQ||[]);
    window._auditQueue=[];window._auditFailQ=[];
    aq.forEach(function(e){try{var _id=e._cid||(e.ts+"-"+Math.random().toString(36).slice(2,9));FB_EVENTS_COL.doc(_id).set(e);}catch(ex){}});
  }
  // Director: run backup
  if(CU&&CU.role==="director"&&FB_READY){
    try{runAutoBackup();}catch(e){}
  }
  // Final sync push before disconnecting
  try{
    if(FB_READY&&FB_DOC_REF&&typeof D==="object"){
      var snap=JSON.parse(JSON.stringify({D:D}));
      delete snap.D.auditLog;
      FB_DOC_REF.set(snap,{merge:true});
    }
  }catch(e){}
  if(FB_HEARTBEAT_TIMER){clearInterval(FB_HEARTBEAT_TIMER);FB_HEARTBEAT_TIMER=null;}
  if(window._syncAgeTicker){clearInterval(window._syncAgeTicker);window._syncAgeTicker=null;}
  if(FB_RECONNECT_TIMER){clearTimeout(FB_RECONNECT_TIMER);FB_RECONNECT_TIMER=null;}
  FB_RECONNECT_ATTEMPTS=0;
  if(FB_UNSUB){try{FB_UNSUB();}catch(e){}FB_UNSUB=null;}
  if(FB_AUDIT_UNSUB){try{FB_AUDIT_UNSUB();}catch(e){}FB_AUDIT_UNSUB=null;}
  FB_READY=false;FB_DOC_REF=null;_APP_READY=false;
  // Clear all session data — security: prevent data leak to next user
  D={customers:[],stock:[],orders:[],offers:[],invoices:[],routes:[],
     complaints:[],pendingPayments:[],auditLog:[]};
  CU=null;SU=null;PE="";
  renderLogin();
}
function nav(p,btn){
  if(!can(p))return;
  document.querySelectorAll(".pg").forEach(function(x){x.classList.remove("act");});
  document.querySelectorAll("#tnav button").forEach(function(x){x.classList.remove("act");});
  var pg=el("pg-"+p);if(pg)pg.classList.add("act");
  if(btn)btn.classList.add("act");
  else document.querySelectorAll("#tnav button").forEach(function(b){
    if((b.getAttribute("onclick")||"").indexOf("'"+p+"'")!==-1)b.classList.add("act");
  });
  el("um").classList.remove("open");
  var fns={dashboard:rDash,customers:function(){rCusts(undefined,CUST_PAGE);},orders:function(){ORD_STATUS_F="";ORD_DATE_F="";rOrds(undefined,ORD_PAGE);},delivery:function(){DEL_Q="";rDel();},stock:function(){rStock(undefined,STK_PAGE);},invoices:function(){INV_Q="";INV_PAGE=0;rInvs();},debts:function(){DEBT_Q="";DEBT_PAGE=0;rDebts();},complaints:function(){CMP_Q="";CMP_PAGE=0;rCmps();},offers:rOffers,reports:rReports,excel:function(){rExcel();setTimeout(startAuditListener,300);},users:rUsers};
  if(fns[p])fns[p]();
}

function rDash(){

    setTimeout(rDash,500);
    return;
  }
  var del=(D.orders||[]).filter(function(o){return o.status==="Delivered";});
  // ── Period filter for financial stats ──────────────────────────────
  // Staff locked to today — no financial period access
  if(CU&&CU.role==="staff")DASH_PERIOD="today";
  var now=new Date();
  var yr=now.getFullYear();
  var mo=now.getMonth(); // 0-based
  var td=_ymd(now); // local-timezone-safe — matches tday() used for order/delivery dates
  var qStart=Math.floor(mo/3)*3; // quarter start month (0-based)
  var qEnd=qStart+2; // quarter end month (0-based)
  // ── Week bounds ───────────────────────────────────────────────────
  var dow=now.getDay(); // 0=Sun
  var weekStart=new Date(now); weekStart.setDate(now.getDate()-(dow===0?6:dow-1)); // Mon
  var weekEnd=new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6); // Sun
  var wkS=_ymd(weekStart);
  var wkE=_ymd(weekEnd);
  var periodDel=del.filter(function(o){
    var dd=(o.deliveredAt||o.date)||"";
    if(!dd)return DASH_PERIOD==="all";
    if(DASH_PERIOD==="today")   return dd===td;
    if(DASH_PERIOD==="week")    return dd>=wkS && dd<=wkE;
    if(DASH_PERIOD==="month")   return dd.startsWith(yr+"-"+String(mo+1).padStart(2,"0"));
    if(DASH_PERIOD==="quarter"){
      var oMo=parseInt(dd.slice(5,7))-1;
      return dd.startsWith(String(yr))&&oMo>=qStart&&oMo<=qEnd;
    }
    return true; // all
  });
  var periodLabel=DASH_PERIOD==="today"?"Today":
    DASH_PERIOD==="week"?"This week ("+wkS.slice(5)+" – "+wkE.slice(5)+")":
    DASH_PERIOD==="month"?["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][mo]+" "+yr:
    DASH_PERIOD==="quarter"?"Q"+(Math.floor(mo/3)+1)+" "+yr:"All time";
  // ── Week daily breakdown (for weekly chart) ───────────────────────
  var wkDays=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var wkRevs=wkDays.map(function(_,i){
    var d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
    var ds=_ymd(d); // local-safe — must match order dates for chart bars to populate correctly
    return del.filter(function(o){var dd=o.deliveredAt||o.date;return dd===ds;}).reduce(function(a,o){return a+o.qty*o.price;},0);
  });
  var wkMax=Math.max.apply(null,wkRevs.concat([1]));
  var todayDow=dow===0?6:dow-1; // 0=Mon…6=Sun
  var rev=periodDel.reduce(function(a,o){return a+o.qty*o.price;},0);

  if(can("vRev")&&lastRev>0){var tp=Math.round((thisRev-lastRev)/lastRev*100);if(Math.abs(tp)>=10){var tc=tp>0?"#27ae60":"#c0392b";alerts.push({t:"ni",i:(tp>0?"ti-trending-up":"ti-trending-down"),m:"Revenue "+(tp>0?"+":"")+tp+"% vs last month — KSh "+thisRev.toLocaleString()+" this month",dest:"reports"});}}

  var churned=(D.customers||[]).filter(function(cu){var lo=(D.orders||[]).filter(function(o){return o.cId===cu.id&&o.status==="Delivered";}).sort(function(a,b){return b.date>a.date?1:-1;})[0];return lo&&lo.date<churnDate;}).length;

  var _urgency={nr:0,nw:1,ni:2,nok:3};alerts.sort(function(a,b){return(_urgency[a.t]||2)-(_urgency[b.t]||2);});

  var fil=(D.customers||[]).filter(function(c){
    if(type2&&c.ctype!==type2)return false;

    var lq=q2.toLowerCase();
    // vPhone gate: staff search by address only — not name or phone
    var searchFields=can("vPhone")?[c.name,c.court,c.house,c.estate]:[c.court,c.house,c.estate];
    if(can("vPhone"))searchFields.push(c.phone,c.phone2);

  });
  // Sort

  var debtMap={};(D.customers||[]).forEach(function(cu){debtMap[cu.id]=custDebt(cu.id);});
  fil=fil.slice().sort(function(a,b){
    if(sort2==="debt"){return custDebt(b.id)-custDebt(a.id);}
    if(sort2==="orders"){
      return (D.orders||[]).filter(function(o){return o.cId===b.id;}).length-
             (D.orders||[]).filter(function(o){return o.cId===a.id;}).length;
    }
    if(sort2==="revenue"){

        "<option value=\"Commercial\" "+(type2==="Commercial"?"selected":"")+">Commercial</option>"+
        "<option value=\"Institution\" "+(type2==="Institution"?"selected":"")+">Institution</option>"+

        "<div id=\"cust-results\"></div>";

  // Always rebuild sort buttons so active state reflects current sort

function saveCust(){
  if(!can("aCust")&&!can("eCust"))return;
  var n=el("cn").value.trim(),ph=el("cph").value.trim();
  if(!n||!ph){toast("Name and phone required","err");return;}
  var editId=el("c-edit-id").value;
  if(editId){
    var c=(D.customers||[]).find(function(x){return String(x.id)===String(editId);});
    if(c){
      c.name=n;c.phone=ph;c.phone2=el("cph2").value;c.idno=el("cid").value;
      c.estate=el("cestate").value;c.court=el("ccourt").value;c.house=el("chouse").value;
      c.htype=el("chtype").value;c.road=el("croad").value;c.zone=el("czone").value;
      c.ctype=el("ctype").value;c.creditLimit=parseFloat(el("ccl").value)||0;c.notes=el("cnotes").value;
      auditLog("CUSTOMER_UPDATED","Customer updated by "+CU.name+" ("+CU.role+"): "+n);
      if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
cm("m-c");rCusts(undefined,CUST_PAGE);dirty();toast("Customer updated");
      return;
    }
  }
  // Duplicate detection: same house+court combination
  var house2=el("chouse").value.trim();var court2=el("ccourt").value.trim();
  if(house2&&court2){
    var dupAddr=(D.customers||[]).find(function(x){
      return String(x.house).trim()===house2&&String(x.court).trim()===court2;
    });
    if(dupAddr){
      if(!confirm("⚠️ Possible duplicate\n\nA customer at Court "+court2+", No."+house2+" already exists:\n"
        +(can("vPhone")?dupAddr.name:maskName(dupAddr.name))+"\n\nContinue adding a new customer?"))return;
    }
  }
  (D.customers||[]).push({id:uid(),name:n,phone:ph,phone2:el("cph2").value,idno:el("cid").value,estate:el("cestate").value,court:el("ccourt").value,house:el("chouse").value,htype:el("chtype").value,road:el("croad").value,zone:el("czone").value,ctype:el("ctype").value,creditLimit:parseFloat(el("ccl").value)||0,notes:el("cnotes").value,created:tday()});
  ["cn","cph","cph2","cid","cestate","ccourt","chouse","croad","czone","cnotes"].forEach(function(id){el(id).value="";});el("ccl").value="0";
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
cm("m-c");rCusts(undefined,CUST_PAGE);dirty();toast("Customer added");
}

function delC(id){
  if(!can("dCust"))return;
  var c=(D.customers||[]).find(function(x){return x.id===id;});if(!c)return;
  var paidInvs=(D.invoices||[]).filter(function(i){return i.cId===id&&i.paid>0;});
  var debt=custDebt(id);
  var msg="Remove "+(can("vPhone")?c.name:"this customer")+"?\n\n";
  if(debt>0)msg+="They have KSh "+debt.toLocaleString()+" outstanding debt — this will be written off.\n\n";
  if(paidInvs.length)msg+=paidInvs.length+" paid invoice(s) will be kept for financial records.\n\n";
  msg+="Their orders and unpaid invoices will be removed. Cannot be undone.";
  if(!confirm(msg))return;
  // Restore stock for any pending orders before removing customer
  (D.orders||[]).filter(function(o){return o.cId===id&&o.status!=="Delivered"&&o.status!=="Cancelled"&&o.prodConfirmed!==false;}).forEach(function(o){
    var st=(D.stock||[]).find(function(s){return s.name===o.prod;});
    if(st)st.qty+=o.qty;
  });
  D.customers=(D.customers||[]).filter(function(x){return x.id!==id;});
  D.orders=(D.orders||[]).filter(function(o){return o.cId!==id;});

function reversePayment(invId,payIdx){
  if(!can("rest")){toast("Director only","err");return;}
  var inv=(D.invoices||[]).find(function(x){return x.id===invId;});
  if(!inv){toast("Invoice not found","err");return;}
  var pays=inv.payments||[];
  if(payIdx<0||payIdx>=pays.length){toast("Payment not found","err");return;}
  var pay=pays[payIdx];
  // Remove the payment entry
  pays.splice(payIdx,1);
  // Recalculate paid total from remaining payments — source of truth
  inv.paid=pays.reduce(function(s,p){return s+(p.amt||0);},0);
  inv.payments=pays;
  // Sync linked order payment status
  var ordMatch=inv.notes&&inv.notes.match(/#(\d+)/);
  if(ordMatch){
    var o=(D.orders||[]).find(function(x){return String(x.id)===ordMatch[1];});
    if(o){
      if(inv.paid>=inv.amount){o.paid="Paid";}else if(inv.paid>0){o.paid="Partial";}else{o.paid="Unpaid";}
      o.amtPaid=inv.paid;
    }
  }
  auditLog("PAYMENT_RECORDED","REVERSAL: KSh "+pay.amt+" removed from Invoice #"+invId+" by "+CU.name+". Method: "+pay.method+". New paid total: KSh "+inv.paid);
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();

  if(el("pg-invoices")&&el("pg-invoices").classList.contains("act"))rInvs(undefined,INV_PAGE);

  if(el("pg-debts")&&el("pg-debts").classList.contains("act"))rDebts();
  toast("Payment reversed — Invoice #"+invId+" updated","ok");
}

function recPay(){
  if(!can("mPaid")){toast("No permission to record payments","err");return;}
  var cId=parseInt(el("pay-cid").value),amt=parseFloat(el("pay-amt").value)||0;
  if(!cId||isNaN(cId)){toast("Invalid customer","err");return;}
  if(!amt||amt<=0){toast("Enter a valid amount greater than zero","err");return;}
  var invId=el("pay-inv-id")&&el("pay-inv-id").value?parseInt(el("pay-inv-id").value):0;
  var payDate=el("pay-date")&&el("pay-date").value?el("pay-date").value:tday();
  var method=el("pay-method")?el("pay-method").value:"Cash";
  var ref=el("pay-ref")?el("pay-ref").value:"";
  // ── INVOICE-SPECIFIC PAYMENT ──────────────────────────────────────────
  if(invId){
    var inv=(D.invoices||[]).find(function(x){return x.id===invId;});if(!inv){toast("Invoice not found","err");return;}
    var bal=inv.amount-inv.paid;
    var credit=0;
    if(amt>bal){
      credit=amt-bal; // overpayment — goes to customer credit
      amt=bal;        // invoice gets exactly what it needs
    }
    if(!inv.payments)inv.payments=[];
    inv.payments.push({date:payDate,amt:amt,method:method,ref:ref});
    inv.paid=inv.payments.reduce(function(s,p){return s+(p.amt||0);},0);
    // Store overpayment as customer credit balance
    if(credit>0){
      var cu=(D.customers||[]).find(function(x){return x.id===cId;});
      if(cu){
        cu.credit=(cu.credit||0)+credit;
        if(!cu.creditLog)cu.creditLog=[];
        cu.creditLog.push({date:payDate,amt:credit,type:"overpayment",invId:invId,method:method,ref:ref,by:CU.name,role:CU.role,note:"Overpayment on Invoice #"+invId});
        toast("KSh "+credit.toLocaleString()+" overpayment stored as credit for "+(can("vPhone")?cu.name:maskName(cu.name)),"ok");
      }
    }
    // Sync linked order
    var ordMatch=inv.notes&&inv.notes.match(/#(\d+)/);
    if(ordMatch){
      var o=(D.orders||[]).find(function(x){return String(x.id)===ordMatch[1];});
      if(o){
        if(inv.paid>=inv.amount){o.paid="Paid";}else if(inv.paid>0){o.paid="Partial";}else{o.paid="Unpaid";}
        o.amtPaid=inv.paid;
      }
    }
    auditLog("PAYMENT_RECORDED","KSh "+amt.toLocaleString()+" on Invoice #"+invId+" by "+CU.name+" ("+CU.role+"). Method: "+method+(ref?" Ref: "+ref:"")+(credit>0?" | KSh "+credit.toLocaleString()+" overpayment added to credit":"")+". Balance: KSh "+(inv.amount-inv.paid).toLocaleString());
  }else{
  // ── CUSTOMER-LEVEL PAYMENT — distribute oldest-first ─────────────────
    var cu2=(D.customers||[]).find(function(x){return x.id===cId;});
    var existingCredit=(cu2&&cu2.credit>0)?cu2.credit:0;
    var totalDebt=(D.invoices||[]).filter(function(i){return i.cId===cId&&i.paid<i.amount&&!i.voided;}).reduce(function(s,i){return s+(i.amount-i.paid);},0);
    // Apply any existing credit balance first
    if(existingCredit>0&&totalDebt>0){
      var useCredit=Math.min(existingCredit,totalDebt);
      cu2.credit-=useCredit;
      if(!cu2.creditLog)cu2.creditLog=[];
      cu2.creditLog.push({date:payDate,amt:-useCredit,type:"applied",by:CU.name,role:CU.role,method:method,note:"Credit applied to payment"});
      amt+=useCredit; // add credit to the payment being allocated
      toast("KSh "+useCredit.toLocaleString()+" credit applied from balance","ok");
    }
    var credit2=0;
    if(amt>totalDebt&&totalDebt>0){
      credit2=amt-totalDebt;
      if(cu2){
        cu2.credit=(cu2.credit||0)+credit2;
        if(!cu2.creditLog)cu2.creditLog=[];
        cu2.creditLog.push({date:payDate,amt:credit2,type:"overpayment",method:method,ref:ref,by:CU.name,role:CU.role,note:"Overpayment on customer account"});
        toast("KSh "+credit2.toLocaleString()+" overpayment stored as credit","ok");
      }
      amt=totalDebt;
    }
    var rem=amt;
    (D.invoices||[]).filter(function(i){return i.cId===cId&&i.paid<i.amount&&!i.voided;})
      .sort(function(a,b){return a.date>b.date?1:-1;})
      .forEach(function(inv){
        if(rem<=0)return;
        var tap=Math.min(rem,inv.amount-inv.paid);
        if(!inv.payments)inv.payments=[];
        inv.payments.push({date:payDate,amt:tap,method:method,ref:ref});
        inv.paid=inv.payments.reduce(function(s,p){return s+(p.amt||0);},0);
        rem-=tap;
        var ordId=inv.notes&&inv.notes.match(/#(\d+)/);
        if(ordId){
          var o2=(D.orders||[]).find(function(x){return String(x.id)===ordId[1];});
          if(o2){
            if(inv.paid>=inv.amount){o2.paid="Paid";}else if(inv.paid>0){o2.paid="Partial";}else{o2.paid="Unpaid";}
            o2.amtPaid=inv.paid;
          }
        }
      });
    auditLog("PAYMENT_RECORDED","KSh "+amt.toLocaleString()+" by "+CU.name+" ("+CU.role+") for customer #"+cId+". Method: "+method+(ref?" Ref: "+ref:"")+". Distributed oldest-first.");
  }
  cm("m-pay");
  // Refresh all affected pages
  rCusts(undefined,CUST_PAGE);
  if(el("pg-invoices")&&el("pg-invoices").classList.contains("act"))rInvs(undefined,INV_PAGE);
  if(el("pg-orders")&&el("pg-orders").classList.contains("act"))rOrds(undefined,ORD_PAGE);
  if(el("pg-debts")&&el("pg-debts").classList.contains("act"))rDebts();
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();
  toast("Payment recorded — KSh "+amt.toLocaleString());
}

function _showIdleWarning(seconds){
  _dismissIdleWarning();
  var d=document.createElement("div");
  d.id="idle-warn-banner";
  d.style.cssText="position:fixed;top:0;left:0;right:0;z-index:99999;background:#c0392b;color:#fff;padding:12px 16px;text-align:center;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap";
  var span=document.createElement("span");

  var btn=document.createElement("button");
  btn.textContent="Stay logged in";
  btn.style.cssText="background:#fff;color:#c0392b;border:none;border-radius:6px;padding:6px 16px;font-weight:700;font-size:13px;cursor:pointer";
  btn.onclick=function(){resetIdleTimer();};
  d.appendChild(span);d.appendChild(btn);
  document.body.appendChild(d);
  _idleWarnEl=d;
  var remaining=seconds;
  var tick=setInterval(function(){
    remaining--;
    if(!_idleWarnEl){clearInterval(tick);return;}
    if(remaining<=0){clearInterval(tick);return;}
    span.textContent="You will be logged out in "+remaining+"s due to inactivity";

function startIdleWatcher(){
  ["click","keydown","touchstart","mousemove"].forEach(function(ev){

  });
  resetIdleTimer();
}
function stopIdleWatcher(){
  if(_idleTimer){clearTimeout(_idleTimer);_idleTimer=null;}
  if(_idleWarnTimer){clearTimeout(_idleWarnTimer);_idleWarnTimer=null;}

function is20ltr(prodName){
  if(!prodName)return false;
  var n=prodName.toLowerCase().replace(/\s+/g,"");
  // 1. Name contains 20ltr variant
  if(/20lt?r?s?/i.test(n)||n.indexOf("20litre")!==-1||n.indexOf("20litres")!==-1)return true;
  // 2. Find matching stock item by exact or normalised name
  var st=(D.stock||[]).find(function(s){
    var sn=s.name.toLowerCase().replace(/\s+/g,"");
    return sn===n||s.name.toLowerCase()===prodName.toLowerCase();
  });
  if(st){
    if(st.isWater===true)return true;
    if(st.size){
      var sz=st.size.toLowerCase().replace(/\s+/g,"");
      if(/20lt?r?s?/i.test(sz)||sz.indexOf("20litre")!==-1)return true;
    }
  }
  // 3. Check if ANY isWater-flagged stock item name is contained in prodName
  //    Handles renamed products (e.g. old orders say "Pick Bottle",
  //    stock now says "Pick Bottle 20ltr" which is isWater=true)
  var waterStocks=(D.stock||[]).filter(function(s){return s.isWater===true;});
  for(var wi=0;wi<waterStocks.length;wi++){
    var ws=waterStocks[wi];
    var wsn=ws.name.toLowerCase();
    var pn2=prodName.toLowerCase();
    // Match if either name is contained in the other (handles renaming)
    if(wsn.indexOf(pn2)!==-1||pn2.indexOf(wsn)!==-1)return true;
  }
  return false;
}

function completeDlv(){
  var oid=parseInt(el("dlv-oid").value);
  var o=(D.orders||[]).find(function(x){return x.id===oid;});if(!o)return;
  // Triple-enforced ownership check — cannot be bypassed
  if(!can("eOrd")&&o.driver&&o.driver!==CU.name){
    toast("Security: you are not assigned to Order #"+oid,"err");
    auditLog("SECURITY_VIOLATION",""+CU.name+" ("+CU.role+") attempted to complete Order #"+oid+" assigned to "+o.driver+" — blocked at completeDlv()");
    return;
  }
  // Guard: cannot complete an already-delivered order
  if(o.status==="Delivered"){
    toast("Order #"+oid+" is already delivered","err");
    return;
  }
  var isCat=o.prodConfirmed===false;

  // ── CATEGORY ORDER: confirm exact product first ──
  if(isCat){
    var sel=el("dlv-prod-select");
    var selVal=sel?sel.value:"";
    if(!selVal){toast("Please select the exact brand being delivered","err");return;}
    if(selVal==="__other__"){
      var otherInput=el("dlv-other-prod");
      var customProd=otherInput?otherInput.value.trim():"";
      if(!customProd){toast("Please type the exact product name","err");return;}
      selVal=customProd+"|0";
    }
    var parts=selVal.split("|");
    var confirmedProd=parts[0];
    var confirmedPrice=parseInt(parts[1])||0;
    // Deduct stock now
    var st=(D.stock||[]).find(function(s){return s.name===confirmedProd;});
    var stCost=st; // read cost BEFORE stock deduction
    if(st){
      if(st.qty<o.qty){
        if(!confirm("⚠️ Only "+st.qty+" in stock but delivering "+o.qty+".\n\nStock will go to 0. Continue?"))return;
      }
      st.qty=Math.max(0,st.qty-o.qty);
      if(!st.history)st.history=[];
      st.history.push({ts:tday(),type:"sale",qty:-o.qty,by:CU.name,ordId:o.id,bal:st.qty});
      if(st.history.length>50)st.history=st.history.slice(-50);
    }
    // Update order with confirmed product
    o.prod=confirmedProd;
    o.price=confirmedPrice;
    o.cost=stCost?stCost.cost:0;
    o.prodConfirmed=true;
  }

  o.status="Delivered";
  o.deliveredAt=tday(); // stamp actual delivery date
  o.completedBy=CU.name;  // who physically completed — for audit accountability
  o.completedRole=CU.role;
  o.bottle_after=el("dlv-btl").value;

  if(can("mPaid")){
    var amt=parseFloat(el("dlv-amt").value)||0;
    var total=o.qty*o.price;
    // Find or create invoice
    var inv=(D.invoices||[]).find(function(i){return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+oid)!==-1;});
    if(isCat&&!inv&&total>0){
      // Create invoice now for category orders (was deferred until delivery)
      inv={id:nIId++,cId:o.cId,amount:total,paid:0,due:tday(),notes:"Order #"+oid,date:tday(),payments:[]};
      (D.invoices||[]).push(inv);
    }
    if(amt>0&&inv){
      if(!inv.payments)inv.payments=[];
      var dlvMethod=el("dlv-method")?el("dlv-method").value:"Cash";
      var dlvAmt=Math.min(amt,inv.amount-inv.paid); // never overpay invoice
      if(dlvAmt>0){
        inv.payments.push({date:tday(),amt:dlvAmt,method:dlvMethod,ref:"Delivery #"+oid});
        inv.paid=inv.payments.reduce(function(s,p){return s+(p.amt||0);},0); // source of truth
        // Overpayment → customer credit
        var dlvOver=amt-dlvAmt;
        if(dlvOver>0){
          var dlvCu=(D.customers||[]).find(function(x){return x.id===o.cId;});
          if(dlvCu){
            dlvCu.credit=(dlvCu.credit||0)+dlvOver;
            if(!dlvCu.creditLog)dlvCu.creditLog=[];
            dlvCu.creditLog.push({date:tday(),amt:dlvOver,type:"overpayment",ordId:oid,method:dlvMethod,by:CU.name,role:CU.role,note:"Overpayment at delivery of Order #"+oid});
          }
        }
      }
    }
    if(inv){
      if(inv.paid>=inv.amount){o.paid="Paid";o.amtPaid=inv.paid;}
      else if(inv.paid>0){o.paid="Partial";o.amtPaid=inv.paid;}
      else{o.paid="Unpaid";}
    }else if(amt>0){
      if(amt>=total){o.paid="Paid";o.amtPaid=amt;}
      else{o.paid="Partial";o.amtPaid=amt;}
    }
  }else{
    o.paid=o.paid||"Unpaid";
  }

  // Staff/driver cash collection: record as pending approval
  if(!can("mPaid")){
    var staffCash=el("dlv-amt")?(parseFloat(el("dlv-amt").value)||0):0;
    if(staffCash>0){
      if(!D.pendingPayments)D.pendingPayments=[];
      var dlvMeth=el("dlv-method")?el("dlv-method").value:"Cash";
      (D.pendingPayments||[]).push({id:uid(),ordId:o.id,cId:o.cId,amt:staffCash,method:dlvMeth,collectedBy:CU.name,collectedRole:CU.role,date:tday(),ack:false});
      auditLog("CASH_PENDING","KSh "+staffCash+" cash collected by "+CU.name+" ("+CU.role+") at delivery of Order #"+o.id+" — pending director acknowledgement");
      toast("KSh "+staffCash.toLocaleString()+" cash recorded — awaiting director confirmation","warn");
    }
  }
  if(el("dlv-notes").value)o.notes=el("dlv-notes").value;
  var assignedStr=o.driver&&o.driver!==CU.name?" (assigned to "+o.driver+")":" (self-assigned)";
  auditLog("DELIVERY_COMPLETE","Order #"+o.id+" completed by "+CU.name+" ("+CU.role+")"+assignedStr+". Product: "+o.prod+", Qty: "+o.qty+". Cash collected: "+(el("dlv-amt")&&el("dlv-amt").value>0?"KSh "+el("dlv-amt").value:"none"));
  // Water delivery cycle counter
  var _isWater=is20ltr(o.prod);
  if(_isWater){
    var _cu=(D.customers||[]).find(function(x){return x.id===o.cId;});
    if(_cu){
      var _prevCycle=_cu.waterCycle||0;
      _cu.waterCycle=_prevCycle+o.qty; // add bottles delivered
      if(!_cu.cycleHistory)_cu.cycleHistory=[];
      // Milestone: crossed 4 bottles (halfway)
      if(_prevCycle<4&&_cu.waterCycle>=4&&_cu.waterCycle<8){
        toast((can("vPhone")?_cu.name:maskName(_cu.name))+" has reached 4 bottles this cycle — halfway!","ok");
        _cu.cycleHistory.push({ts:tday(),bottles:_cu.waterCycle,event:"milestone_4",ordId:o.id,qty:o.qty,by:CU.name});
      }
      if(_cu.waterCycle>=8){
        toast((can("vPhone")?_cu.name:maskName(_cu.name))+" reached "+_cu.waterCycle+" bottles — cycle resets!","ok");
        _cu.cycleHistory.push({ts:tday(),bottles:_cu.waterCycle,event:"cycle_complete",ordId:o.id,qty:o.qty,by:CU.name});
        _cu.waterCycle=_cu.waterCycle-8; // carry over excess bottles to next cycle
      }
    }
  }
  cm("m-dlv");rOrds(undefined,ORD_PAGE);rDel();
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  if(el("pg-customers")&&el("pg-customers").classList.contains("act"))rCusts();
  updateStockBadge();
  dirty();
  toast(isCat?"Delivery completed — "+o.prod+" confirmed!":"Delivery completed!");
}
function delO(id){
  if(!can("dOrd"))return;
  var o=(D.orders||[]).find(function(x){return x.id===id;});if(!o)return;
  var hasPaid=(D.invoices||[]).some(function(i){return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+id)!==-1&&i.paid>0;});
  var msg=hasPaid?
    "Delete order #"+id+"?\n\nThis order has payments on record. The invoice will be kept for your financial records, but the order will be removed.":
    "Delete order #"+id+"? The linked invoice will also be removed.";
  if(!confirm(msg))return;
  // Restore stock — skip for category orders (prodConfirmed===false means no stock was deducted)
  var st=(D.stock||[]).find(function(s){return s.name===o.prod;});
  var wasStockDeducted=(o.prodConfirmed!==false);
  if(st&&o.status!=="Delivered"&&o.status!=="Cancelled"&&wasStockDeducted){
    st.qty+=o.qty;
    if(!st.history)st.history=[];
    st.history.push({ts:tday(),type:"restore",qty:+o.qty,by:CU.name,ordId:oid,bal:st.qty});
    if(st.history.length>50)st.history=st.history.slice(-50);
    updateStockBadge();
  }
  // Remove order — tombstone it so an in-flight/stale sync snapshot can't resurrect it
  _recentlyDeletedOrderIds[id]=Date.now();
  D.orders=(D.orders||[]).filter(function(x){return x.id!==id;});
  // Remove unpaid invoices only — keep paid ones for records
  D.invoices=(D.invoices||[]).filter(function(i){
    var linked=i.notes&&i.notes.indexOf("#"+id)!==-1;
    if(linked&&i.paid<=0)return false;
    return true;
  });
  auditLog("ORDER_DELETED","Order #"+id+" deleted by "+CU.name+" ("+CU.role+"). Product: "+o.prod+", Qty: "+o.qty+", Status was: "+o.status);
  rOrds(undefined,ORD_PAGE);
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();toast("Order #"+id+" deleted");
}

function cancelO(id){
  if(!can("eOrd"))return;
  var o=(D.orders||[]).find(function(x){return x.id===id;});if(!o)return;
  if(o.status==="Cancelled"){toast("Already cancelled");return;}
  if(o.status==="Delivered"){toast("Cannot cancel a delivered order — delete it if needed","err");return;}
  var inv=(D.invoices||[]).find(function(i){return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+id)!==-1;});
  var hasPaid=inv&&inv.paid>0;
  var isCatOrder=(o.prodConfirmed===false);
  var msg=hasPaid?
    "Cancel order #"+id+"?\n\nKSh "+inv.paid.toLocaleString()+" has already been paid. The invoice will stay with the paid amount recorded."+(isCatOrder?" No stock to restore.":"\ Stock will be restored."):
    "Cancel order #"+id+"?"+(isCatOrder?" Category order — no stock to restore. Invoice will be removed.":" Stock will be restored and the invoice removed.");
  if(!confirm(msg))return;
  // Restore stock
  var skipStockRestore=(o.prodConfirmed===false);
  var st=(D.stock||[]).find(function(s){return s.name===o.prod;});
  if(st&&!skipStockRestore){
    st.qty+=o.qty;
    if(!st.history)st.history=[];
    st.history.push({ts:tday(),type:"restore",qty:+o.qty,by:CU.name,ordId:id,bal:st.qty});
    if(st.history.length>50)st.history=st.history.slice(-50);
    updateStockBadge();
  }
  // Update order status
  o.status="Cancelled";
  o.paid=hasPaid?"Partial":"Cancelled";
  // Handle invoice
  if(inv){
    if(hasPaid){
      // Keep invoice but zero the balance — only owed what was paid
      inv.amount=inv.paid;
    }else{
      // Remove fully unpaid invoice
      D.invoices=(D.invoices||[]).filter(function(i){return i.id!==inv.id;});
    }
  }
  auditLog("ORDER_CANCELLED","Order #"+id+" cancelled by "+CU.name+" ("+CU.role+"). Product: "+o.prod+", Qty: "+o.qty+(hasPaid?", KSh "+inv.paid+" already paid — invoice kept":""));
  rOrds(undefined,ORD_PAGE);rDel();
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();toast("Order #"+id+" cancelled"+(skipStockRestore?" — category order":" — stock restored"));
}

function findMissingOrders(){
  if(!can("rest")){toast("Only directors can run reconciliation","err");return;}
  var placed={};
  (D.auditLog||[]).forEach(function(e){
    if(e.action!=="ORDER_PLACED")return;
    var m=e.details&&e.details.match(/^#(\d+) (.+?) x(\d+)/);
    if(!m)return;
    placed[m[1]]={id:parseInt(m[1]),prod:m[2],qty:parseInt(m[3]),ts:e.ts};
  });
  var liveIds={};
  (D.orders||[]).forEach(function(o){liveIds[o.id]=true;});
  var missing=[];
  Object.keys(placed).forEach(function(id){
    if(liveIds[id])return; // still exists — not missing
    var rec=placed[id];
    var inv=(D.invoices||[]).find(function(i){return i.notes&&i.notes.indexOf("#"+id)!==-1;});
    var cust=inv?(D.customers||[]).find(function(c){return c.id===inv.cId;}):null;
    var viaCycle=false;
    if(!cust){
      // Fallback: check water-cycle history (20L milestone deliveries reference
      // ordId directly) — only covers a subset of orders but adds a second
      // recovery source when the invoice is unavailable.
      var found=null;
      (D.customers||[]).forEach(function(c){
        if(found)return;
        (c.cycleHistory||[]).forEach(function(h){
          if(String(h.ordId)===String(id))found=c;
        });
      });
      if(found){cust=found;viaCycle=true;}
    }
    missing.push({
      origId:rec.id,prod:rec.prod,qty:rec.qty,ts:rec.ts,
      cId:cust?cust.id:null,cName:cust?cust.name:"Unknown — select manually",
      price:inv?(inv.amount/rec.qty):null,
      source:inv?"invoice":(viaCycle?"cycle history (price unknown — enter manually)":"none found")
    });
  });
  return missing;
}

    if(i){

function ackPendingPay(id){

  if(!D.pendingPayments)return;
  var pp=(D.pendingPayments||[]).find(function(x){return x.id===id;});
  if(!pp||pp.ack){toast("Already acknowledged","warn");return;}
  // Apply payment to linked invoice
  var inv=(D.invoices||[]).find(function(i){return i.cId===pp.cId&&i.paid<i.amount;});
  if(inv){
    var apply=Math.min(pp.amt,inv.amount-inv.paid);
    inv.paid+=apply;
    if(!inv.payments)inv.payments=[];
    inv.payments.push({date:tday(),amt:apply,method:pp.method,ref:"Staff collection by "+pp.collectedBy+" — ack by "+CU.name});
    if(inv.paid>=inv.amount){var o=(D.orders||[]).find(function(x){return x.id===pp.ordId;});if(o)o.paid="Paid";}
  }
  pp.ack=true;pp.ackedBy=CU.name;pp.ackedDate=tday();
  auditLog("CASH_ACKNOWLEDGED","Director "+CU.name+" acknowledged KSh "+pp.amt+" cash collected by "+pp.collectedBy+" for Order #"+pp.ordId);
  dirty();
  toast("Payment of KSh "+pp.amt.toLocaleString()+" acknowledged and applied");

  rInvs(undefined,INV_PAGE);

}

function cmpCustSearch(q){
  var drop=el("cmp-c-drop");if(!drop)return;
  var hidden=el("cmp-c");if(!hidden)return;
  if(!q||q.length<1){drop.style.display="none";return;}
  var lq=q.toLowerCase();
  var canSeeName=can("vPhone"); // vPhone controls name/phone visibility
  var matches=(D.customers||[]).filter(function(cu){
    if(canSeeName){
      return cu.name.toLowerCase().indexOf(lq)!==-1||
        (cu.court&&cu.court.toLowerCase().indexOf(lq)!==-1)||
        (cu.estate&&cu.estate.toLowerCase().indexOf(lq)!==-1)||
        (cu.house&&String(cu.house).indexOf(lq)!==-1)||
        (cu.phone&&cu.phone.indexOf(q)!==-1);
    }else{
      // Staff/driver: search by house number and court/estate only — no name, no phone
      return (cu.house&&String(cu.house).indexOf(lq)!==-1)||
        (cu.court&&cu.court.toLowerCase().indexOf(lq)!==-1)||
        (cu.estate&&cu.estate.toLowerCase().indexOf(lq)!==-1);
    }
  }).slice(0,12);
  if(!matches.length){
    drop.innerHTML="<div style=\"padding:10px 14px;font-size:12px;color:var(--tx2)\">No customers found</div>";
    drop.style.display="block";return;
  }
  drop.innerHTML=matches.map(function(cu){
    var house=cu.house?"No."+cu.house:"";
    var court=cu.court||"";
    var estate=cu.estate||"";
    var addr=[estate,court,house].filter(Boolean).join(", ");
    // What to show as primary label depends on role
    var label=canSeeName?cu.name:addr; // staff see address, not name
    var sub=canSeeName?addr:""; // staff get no sub-label (already showing address)
    // What value shows in the input after selection
    var selectLabel=canSeeName?cu.name:addr;
    return "<div onmousedown=\"cmpCustSelect("+cu.id+",'"+selectLabel.replace(/'/g,"\\'")+"')\""+
      " style=\"padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--bd);font-size:12px\""+
      " onmouseover=\"this.style.background='var(--bg)'\" onmouseout=\"this.style.background=''\">"+
      "<div style=\"font-weight:700\">"+label+"</div>"+
      (sub?"<div style=\"font-size:11px;color:var(--tx2)\">"+sub+"</div>":"")+
      "</div>";
  }).join("");
  drop.style.display="block";
}

function exportAuditCSV(){
  if(!can("exp")){toast("Director only","err");return;}
  var logs=[].concat(D.auditLog||[]).reverse();
  if(!logs.length){toast("No audit entries to export");return;}
  var rows=["Timestamp,User,Role,Action,Details"];
  logs.forEach(function(e){
    var dt=e.ts?new Date(e.ts).toISOString().replace("T"," ").slice(0,19):"";
    var det=(e.details||"").replace(/,/g,";").replace(/"/g,"'");
    rows.push('"'+dt+'","'+(e.user||"")+'","'+(e.role||"")+'","'+(e.action||"")+'","'+det+'"');
  });
  var csv=rows.join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="newdawn_audit_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
  toast("Exported "+logs.length+" entries to CSV");
}

function rAuditLogWithArchives(){
  var btn=event&&event.target;
  if(btn){btn.innerHTML="<i class=\"ti ti-loader\"></i> Loading...";btn.disabled=true;}
  loadAuditArchives(function(archived){
    var hot=D.auditLog||[];
    var combined=[].concat(hot).concat(archived);
    // Deduplicate by ts
    var seen={};
    combined=combined.filter(function(e){if(!e.ts||seen[e.ts])return false;seen[e.ts]=true;return true;});
    combined.sort(function(a,b){return b.ts>a.ts?1:-1;});
    var auditSection=el("audit-log-section");
    if(!auditSection){if(btn){btn.innerHTML="<i class=\"ti ti-archive\"></i> Load archives";btn.disabled=false;}return;}
    // Show count
    toast("Loaded "+combined.length+" entries ("+hot.length+" hot + "+archived.length+" archived)");
    if(btn){btn.innerHTML="<i class=\"ti ti-check\"></i> "+combined.length+" loaded";btn.disabled=false;}
    // Re-render with combined data
    var PREV=D.auditLog;
    D.auditLog=combined;
    AUDIT_PAGE=0;
    rAuditLog();
    D.auditLog=PREV; // restore — archives stay in Firestore, not in hot log
  });
}

function prepChangePin(uid2){
  if(!can("mUsers"))return;
  var u=(USERS||[]).find(function(x){return x.id===uid2;});if(!u)return;
  // Director can only change: their own PIN, or Staff/Manager PINs
  // Director cannot change another Director's PIN
  if(u.role==="director"&&u.id!==CU.id){

  }
  el("pin-uid").value=uid2;
  el("pin-new").value="";el("pin-confirm").value="";el("pin-err").textContent="";
  el("pin-title").textContent=u.id===CU.id?"Change My PIN":"Change PIN — "+u.name;
  el("pin-info").innerHTML="<strong>"+(u.id===CU.id?"Your account":"Staff member: "+u.name)+"</strong><br>"+
    "Role: <span class=\"badge\" style=\"background:"+R[u.role].bg+";color:"+R[u.role].c+"\">"+R[u.role].label+"</span><br><br>"+
    "Enter a new 4-digit PIN. The change takes effect immediately on all devices.";

function savePin(){
  if(!can("mUsers"))return;
  var uid2=parseInt(el("pin-uid").value);
  var u=(USERS||[]).find(function(x){return x.id===uid2;});
  if(!u){toast("User not found","err");return;}
  // Security: double-check director cannot change another director's PIN
  if(u.role==="director"&&u.id!==CU.id){toast("Cannot change another Director's PIN","err");return;}
  var p1=el("pin-new").value.replace(/[^0-9]/g,"");
  var p2=el("pin-confirm").value.replace(/[^0-9]/g,"");
  var errEl=el("pin-err");
  if(p1.length!==4){errEl.textContent="PIN must be exactly 4 digits";return;}
  if(p1!==p2){errEl.textContent="PINs do not match — try again";return;}
  // Check not already used by someone else
  var conflict=(USERS||[]).find(function(x){return x.pin===p1&&x.id!==uid2;});
  if(conflict){errEl.textContent="That PIN is already used by "+conflict.name+" — choose a different one";return;}
  u.pin=p1;
  // If changing own PIN, update CU too
  if(u.id===CU.id)CU.pin=p1;
  cm("m-pin");rUsers();
  auditLog("PIN_CHANGED","PIN changed by "+CU.name+" ("+CU.role+") for: "+u.name);
  dirty();
  toast(u.id===CU.id?"Your PIN updated — use it from next login":"PIN updated for "+u.name);
}

function checkBackupReminder(){
  if(!CU||CU.role!=="director"||!can("exp"))return;
  // Never nag on mobile — cloud backups run automatically; Excel download is meaningless on phone
  var isMobile=window.innerWidth<768||navigator.maxTouchPoints>0;
  // Check cloud backup stamp (cross-device truth) first
  var cloudBackupToday=D._lastDailyBackup&&D._lastDailyBackup===tday();
  // Check manual Excel download (laptop only)
  var localBackupToday=localStorage.getItem("nd_last_backup")===tday();
  // Update the badge in the Data tab (always, silent)
  updateBackupBadge();
  // No dialog if: mobile, OR cloud backed up today, OR manual backup today
  if(isMobile||cloudBackupToday||localBackupToday)return;
  // Only interrupt with a dialog if genuinely no backup in 3+ days
  var lastCloud=D._lastDailyBackup||"";
  var lastManual=localStorage.getItem("nd_last_backup")||"";
  var lastAny=lastCloud>lastManual?lastCloud:lastManual;
  var daysSince=lastAny?Math.floor((new Date(tday())-new Date(lastAny))/(1000*60*60*24)):999;
  if(daysSince>=3){
    setTimeout(function(){
      var msg="⚠️ No backup in "+(daysSince===999?"a while":daysSince+" days")+".";
      msg+="\n\nCloud backups run automatically, but downloading a local copy is extra protection.";
      msg+="\n\nDownload a backup now?";
      if(confirm(msg)){saveXL();}
    },3000);
  }
}
function updateBackupBadge(){
  // Update backup status badge in Data tab without interrupting the user
  var badge=el("backup-status-badge");
  if(!badge)return;
  var cloudBackupToday=D._lastDailyBackup&&D._lastDailyBackup===tday();
  var manualToday=localStorage.getItem("nd_last_backup")===tday();
  var lastCloud=D._lastDailyBackup||"";
  var lastManual=localStorage.getItem("nd_last_backup")||"";
  var lastAny=lastCloud>lastManual?lastCloud:lastManual;
  var daysSince=lastAny?Math.floor((new Date(tday())-new Date(lastAny))/(1000*60*60*24)):999;
  if(cloudBackupToday||manualToday){
    badge.innerHTML="<i class=\"ti ti-shield-check\"></i> Backed up today";
    badge.style.background="#27ae60";badge.style.color="#fff";
  }else if(daysSince<=2){
    badge.innerHTML="<i class=\"ti ti-shield\"></i> Last backup: "+lastAny;
    badge.style.background="#f39c12";badge.style.color="#fff";
  }else{
    badge.innerHTML="<i class=\"ti ti-shield-off\"></i> No recent backup — click to download";
    badge.style.background="#e74c3c";badge.style.color="#fff";
    badge.setAttribute("onclick","saveXL()");

  }
}

function ejConfigured(){return EJ_PUBLIC_KEY&&EJ_SERVICE_ID&&EJ_TEMPLATE_ID&&EJ_TO_EMAIL;}
function saveEJConfig(){
  EJ_PUBLIC_KEY=el("ej-pk").value.trim();
  EJ_SERVICE_ID=el("ej-sid").value.trim();
  EJ_TEMPLATE_ID=el("ej-tid").value.trim();
  EJ_TO_EMAIL=el("ej-email").value.trim();
  // Strip accidental full URLs — extract just the ID
  if(EJ_TEMPLATE_ID.indexOf("/")!==-1){
    var parts=EJ_TEMPLATE_ID.split("/");
    EJ_TEMPLATE_ID=parts[parts.length-1]||parts[parts.length-2];
    if(EJ_TEMPLATE_ID==="content")EJ_TEMPLATE_ID=parts[parts.length-2];
  }
  localStorage.setItem("nd_ej_pk",EJ_PUBLIC_KEY);
  localStorage.setItem("nd_ej_sid",EJ_SERVICE_ID);
  localStorage.setItem("nd_ej_tid",EJ_TEMPLATE_ID);
  localStorage.setItem("nd_ej_email",EJ_TO_EMAIL);
  if(ejConfigured()){
    emailjs.init({publicKey:EJ_PUBLIC_KEY});
    toast("Email backup configured — template: "+EJ_TEMPLATE_ID);
    scheduleEmailBackup();
  }else{toast("Fill all fields to enable email backup","err");}
  rExcel();
}
function sendEmailBackup(manual){
  if(!ejConfigured()){if(manual)toast("Set up email backup first in Data tab","err");return;}
  var today=new Date().toISOString().split("T")[0];
  if(!manual&&EJ_LAST_SENT===today){return;}
  toast(manual?"Building backup & sending email...":"Sending scheduled midnight backup...");
  var wb=buildBackupWB();
  var wbout=XLSX.write(wb,{bookType:"xlsx",type:"base64"});
  var filename="NewDawn_Backup_"+today+".xlsx";
  var summary={
    customers:(D.customers||[]).length,
    orders:(D.orders||[]).length,
    pending:(D.orders||[]).filter(function(o){return o.status==="Pending"||o.status==="Processing";}).length,
    revenue:"KSh "+((D.orders||[]).filter(function(o){return o.status==="Delivered";}).reduce(function(s,o){return s+o.qty*o.price;},0)).toLocaleString(),
    debt:"KSh "+((D.invoices||[]).reduce(function(s,i){return s+Math.max(0,i.amount-i.paid);},0)).toLocaleString(),
    stock:(D.stock||[]).length,
    complaints:(D.complaints||[]).filter(function(c){return c.status!=="Resolved";}).length
  };
  emailjs.send(EJ_SERVICE_ID,EJ_TEMPLATE_ID,{
    backup_date:today,
    customers:summary.customers,
    orders:summary.orders,
    pending:summary.pending,
    revenue:summary.revenue,
    debt:summary.debt,
    stock:summary.stock,
    complaints:summary.complaints,
    excel_attachment:"data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,"+wbout,
    filename:filename
  }).then(function(){
    EJ_LAST_SENT=today;
    localStorage.setItem("nd_ej_last",today);
    toast("Backup email sent with Excel attached");
    var el2=el("ej-last");if(el2)el2.textContent="Last sent: "+today+" at "+new Date().toLocaleTimeString();
  }).catch(function(err){
    var msg=err.text||err.message||JSON.stringify(err)||"unknown error";
    toast("Backup email failed (unrelated to order sync — check EmailJS settings): "+msg,"err");
    // EmailJS error — Service:"+EJ_SERVICE_ID+" Template:"+EJ_TEMPLATE_ID);
  });
}
function scheduleEmailBackup(){
  if(!CU||CU.role!=="director")return; // email backup director only
  if(EJ_TIMER)clearInterval(EJ_TIMER);
  if(!ejConfigured())return;
  EJ_TIMER=setInterval(function(){
    var now=new Date();
    if(now.getHours()===0&&now.getMinutes()===0){
      sendEmailBackup(false);
    }
  },60000);
}

/* ───────────────────────────────────────────────────
   AUTO-SAVE SYSTEM
   Layer 1: File System Access API (Chrome/Edge desktop) - true silent overwrite of a chosen file
   Layer 2: Browser local storage snapshot (works on ALL devices incl. phones) - safety net per-device
   Layer 3: Manual Save/Restore/Merge - for moving data between devices (Excel)
   ─────────────────────────────────────────────────── */
var AS_HANDLE=null;       // File System Access API handle, once user picks a file
var AS_TIMER=null;
var AS_INTERVAL_MS=60000; // 1 minute
var AS_SUPPORTED=(typeof window.showSaveFilePicker==="function");

function lsKey(){return "newdawn_autosave_"+(CU?CU.id+"_"+CU.role:"shared");}

function autoSaveLocal(){
  try{
    var snapshot={D:D,USERS:USERS,nOId:nOId,nIId:nIId,nCId:nCId,ts:new Date().toISOString(),setupDone:FB_SETUP_DONE};
    var json=JSON.stringify(snapshot);
    // Save to user-keyed slot (prevents staff save overwriting director data)
    var key=lsKey();
    localStorage.setItem(key,json);
    // Also save to shared slot for cross-user recovery
    localStorage.setItem("newdawn_autosave_shared",json);
    // Redundant copy in sessionStorage for same-session recovery
    try{sessionStorage.setItem("newdawn_session_backup",json);}catch(e2){}
    return true;
  }catch(e){return false;}
}
function autoSaveCheckLocal(){
  try{
    // Prefer user-keyed slot (most relevant to this user)
    var raw=localStorage.getItem(lsKey())||localStorage.getItem("newdawn_autosave_shared");
    if(!raw){
      // Try sessionStorage as fallback
      try{raw=sessionStorage.getItem("newdawn_session_backup");}catch(e2){}
    }
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

async function pickAutoSaveFile(){
  if(!AS_SUPPORTED){
    toast("Auto-overwrite to a chosen file needs Chrome or Edge on a laptop. Using safe local auto-save instead.","warn");
    return;
  }
  try{
    AS_HANDLE=await window.showSaveFilePicker({
      suggestedName:"NewDawn_AutoSave.xlsx",
      types:[{description:"Excel Workbook",accept:{"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet":[".xlsx"]}}]
    });
    var ok=await writeAutoSaveFile();
    if(ok){
      toast("Auto-save file linked. Saving every 1 minute automatically.");
      updateAutoSaveUI(true);
    }
  }catch(err){
    if(err && err.name==="AbortError")return;
    toast("Could not set up auto-save file: "+(err&&err.message?err.message:"unknown error"),"err");
  }
}
async function writeAutoSaveFile(){
  if(!AS_HANDLE)return false;
  try{
    var wb=buildBackupWB();
    var out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
    var writable=await AS_HANDLE.createWritable();
    await writable.write(out);
    await writable.close();
    return true;
  }catch(err){
    toast("Auto-save write failed - will retry next cycle","warn");
    return false;
  }
}
function stopAutoSaveFile(){
  AS_HANDLE=null;
  updateAutoSaveUI(false);
  toast("Auto-overwrite file disconnected. Local safety auto-save continues.");
}
function updateAutoSaveUI(linked){
  var b=el("aslink");
  if(b){
    if(linked){
      b.innerHTML="<i class=\"ti ti-link\"></i> Auto-save file linked";
      b.className="btn btn-sm btn-grn";
      b.setAttribute("onclick","stopAutoSaveFile()");
    }else{
      b.innerHTML="<i class=\"ti ti-link-plus\"></i> Link a file for auto-overwrite";
      b.className="btn btn-sm btn-navy";
      b.setAttribute("onclick","pickAutoSaveFile()");
    }
  }
  var ind2=el("as-indicator2");
  if(ind2)ind2.innerHTML=linked?"<i class=\"ti ti-device-floppy\"></i> Overwriting file every 1 min":"<i class=\"ti ti-refresh\"></i> Running (local safety copy)";
}
function startAutoSaveLoop(){
  if(AS_TIMER)clearInterval(AS_TIMER);
  AS_TIMER=setInterval(async function(){
    autoSaveLocal();
    if(AS_HANDLE){
      await writeAutoSaveFile();
    }
    var l=el("lsl");
    if(l)l.innerHTML="Auto-saved at "+new Date().toLocaleTimeString()+(AS_HANDLE?" (file overwritten)":" (local safety copy)");
    var asind=el("as-indicator");
    if(asind)asind.innerHTML="<i class=\"ti ti-refresh\"></i> Last auto-save: "+new Date().toLocaleTimeString();
  },AS_INTERVAL_MS);
}
function stopAutoSaveLoop(){if(AS_TIMER){clearInterval(AS_TIMER);AS_TIMER=null;}}

function restoreXL(input){

  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      function get(n){return wb.SheetNames.indexOf(n)!==-1?XLSX.utils.sheet_to_json(wb.Sheets[n]):null;}
      var sheetsFound=wb.SheetNames.length;
      if(sheetsFound===0)throw new Error("Empty workbook - no sheets found");

      var c=get("Customers");if(c&&c.length)D.customers=c.map(function(r){return{id:(r.ID!==undefined&&r.ID!==null&&r.ID!=="")?r.ID:Date.now()+Math.floor(Math.random()*1000),name:r.Name||"",phone:r.Phone||"",phone2:r.Phone2||"",idno:r.IDNo||"",estate:r.Estate||"",court:r.Court||"",house:r.HouseNo||"",htype:r.HouseType||"House",road:r.Road||"",zone:r.Zone||"",ctype:r.Type||"Residential",credit:r.CreditLimit||0,notes:r.Notes||"",created:r.Created||""};});
      else if(c)D.customers=[];

      var o=get("Orders");if(o&&o.length)D.orders=o.map(function(r){return{id:(r.ID!==undefined&&r.ID!==null&&r.ID!=="")?r.ID:Date.now()+Math.floor(Math.random()*1000),cId:r.CustomerID||0,prod:r.Product||"",qty:r.Qty||0,price:r.UnitPrice||0,date:r.Date||"",status:r.Status||"Pending",paid:r.Payment||"Unpaid",amtPaid:r.AmtPaid||0,driver:r.Driver||"",deliver:r.DeliveryAddr||"",bottle_before:r.BottleBefore||"Good",bottle_after:r.BottleAfter||null,notes:r.Notes||""};});
      else if(o)D.orders=[];

function syncWaterCycles(){
  // Lightweight water-only resync — no credit migration, no stock fixes
  // Safe to call after stock edit without racing the main dirty() write
  if(!CU||CU.role!=="director"||!FB_READY)return;
  var changed=0;
  (D.customers||[]).forEach(function(cu){
    var waterOrds=(D.orders||[]).filter(function(o){
      return o.cId===cu.id&&o.status==="Delivered"&&is20ltr(o.prod);
    }).sort(function(a,b){
      var da=a.deliveredAt||a.date||"";var db=b.deliveredAt||b.date||"";
      return da>db?1:da<db?-1:0;
    });
    var totalBottles=waterOrds.reduce(function(s,o){return s+(o.qty||1);},0);
    var correct=totalBottles%8;
    if(cu.waterCycle!==correct){
      cu.waterCycle=correct;
      // Rebuild history
      var newH=[];var cum=0;var cyc=0;
      for(var oi=0;oi<waterOrds.length;oi++){
        var ord=waterOrds[oi];var prev=cum;
        cum+=(ord.qty||1);
        if(prev<4&&cum>=4&&cum<8)newH.push({ts:ord.deliveredAt||ord.date||tday(),bottles:cum,event:"milestone_4",ordId:ord.id,qty:ord.qty,by:"System (sync)"});
        while(cum>=8){cyc++;newH.push({ts:ord.deliveredAt||ord.date||tday(),bottles:8,event:"cycle_complete",cycleNum:cyc,ordId:ord.id,qty:ord.qty,by:"System (sync)"});cum-=8;}
      }
      var manual=(cu.cycleHistory||[]).filter(function(h){return h.by&&h.by!=="System (bootstrap)"&&h.by!=="System (sync)";});
      cu.cycleHistory=newH.concat(manual);
      changed++;
    }
  });
  if(changed>0){
    dirty();
    toast("Water cycles updated for "+changed+" customer(s)","ok");
    if(el("pg-customers")&&el("pg-customers").classList.contains("act"))rCusts();
  }
}
function runIntegrityCheck(){
  if(!CU||CU.role!=="director"||!FB_READY)return;
  var issues=[];
  // Fix: migrate old c.credit (used as creditLimit) to c.creditLimit
  // If c.credit > 0 but creditLog is empty or missing, it was set via the form
  // (old behaviour before the split) — move it to creditLimit and zero credit
  var migrated=0;
  (D.customers||[]).forEach(function(cu){
    if((cu.credit>0)&&(!cu.creditLog||!cu.creditLog.length)){
      // No payment history means this was set via the form as creditLimit
      if(!cu.creditLimit||cu.creditLimit===0){cu.creditLimit=cu.credit;}
      cu.credit=0;
      migrated++;
    }
  });
  if(migrated>0){issues.push("Migrated "+migrated+" customer(s): moved form-set credit to creditLimit field");dirty();}
  // ── Water cycle sync — always recompute from delivered orders ────────
  // Source of truth: sum of o.qty for all delivered 20ltr orders per customer
  // Runs every director login to auto-correct any drift
  var bootstrapped=0;
  (D.customers||[]).forEach(function(cu){
    // Find ALL delivered 20ltr water orders for this customer, sorted by date
    var waterOrds=(D.orders||[]).filter(function(o){
      return o.cId===cu.id&&o.status==="Delivered"&&is20ltr(o.prod);
    }).sort(function(a,b){
      var da=a.deliveredAt||a.date||"";
      var db=b.deliveredAt||b.date||"";
      return da>db?1:da<db?-1:0;
    });
    // Sum total bottles from quantities
    var totalBottles=waterOrds.reduce(function(s,o){return s+(o.qty||1);},0);
    var correctCycle=totalBottles%8;
    var correctResets=Math.floor(totalBottles/8);
    // Only update if changed — avoids unnecessary dirty/sync
    var changed=cu.waterCycle!==correctCycle;
    cu.waterCycle=correctCycle;
    // Rebuild cycle history from scratch based on cumulative bottle counts
    if(!cu.cycleHistory)cu.cycleHistory=[];
    // Build history entries for each cycle reset using cumulative bottle tally
    var newHistory=[];
    var cumBottles=0;
    var cycleCount=0;
    for(var oi=0;oi<waterOrds.length;oi++){
      var ord=waterOrds[oi];
      var prevCum=cumBottles;
      cumBottles+=(ord.qty||1);
      // Check if we crossed the 4-bottle milestone in this order
      if(prevCum<4&&cumBottles>=4&&cumBottles<8){
        // Keep existing milestone_4 entry if same order, else add
        newHistory.push({ts:ord.deliveredAt||ord.date||tday(),bottles:cumBottles,event:"milestone_4",ordId:ord.id,qty:ord.qty,by:"System (sync)"});
      }
      // Check if we crossed an 8-bottle cycle completion
      while(cumBottles>=8){
        cycleCount++;
        newHistory.push({ts:ord.deliveredAt||ord.date||tday(),bottles:8,event:"cycle_complete",cycleNum:cycleCount,ordId:ord.id,qty:ord.qty,by:"System (sync)"});
        cumBottles-=8; // carry over excess
      }
    }
    // Preserve any manual history entries (not system-generated)
    var manualEntries=(cu.cycleHistory||[]).filter(function(h){return h.by&&h.by!=="System (bootstrap)"&&h.by!=="System (sync)";});
    cu.cycleHistory=newHistory.concat(manualEntries);
    if(changed)bootstrapped++;
  });
  if(bootstrapped>0){
    dirty();
    issues.push("Water cycle synced for "+bootstrapped+" customer(s) — quantities recomputed from delivered orders");
    if(el("pg-customers")&&el("pg-customers").classList.contains("act"))rCusts();
  }
  // Check 1: negative stock
  (D.stock||[]).forEach(function(s){
    if(s.qty<0){s.qty=0;issues.push("Stock: "+s.name+" had negative qty — reset to 0");}
  });
  // Check 2: orders referencing missing customers
  var custIds=(D.customers||[]).reduce(function(m,c){m[c.id]=true;return m;},{});
  (D.orders||[]).forEach(function(o){
    if(!custIds[o.cId])issues.push("Order #"+o.id+" references missing customer ID "+o.cId);
  });
  // Check 3: orphaned invoices (no matching order, amount unpaid)
  (D.invoices||[]).forEach(function(inv){
    if(inv.paid>=inv.amount||inv.voided)return; // paid or voided — ignore
    var ordMatch=inv.notes&&inv.notes.match(/#(\d+)/);
    if(ordMatch){
      var o=(D.orders||[]).find(function(x){return String(x.id)===ordMatch[1];});
      if(!o)issues.push("Invoice #"+inv.id+" references deleted order #"+ordMatch[1]+" — KSh "+(inv.amount-inv.paid)+" outstanding");
    }
  });
  // Check 4: ID counter sync
  syncIdCounters();
  // Check 5: payment status sync
  syncPaymentStatuses();
  if(issues.length>0){
    if((D.stock||[]).some(function(s){return s.qty===0&&issues.some(function(i){return i.indexOf(s.name)>-1});}))dirty();
    auditLog("CUSTOMER_UPDATED","Data integrity check: "+issues.length+" issue(s) — "+issues.slice(0,3).join("; "));
    // Show director what was fixed
    toast("✓ Data check: "+issues.length+" item(s) corrected — see audit log","ok");
  }
  // Always confirm bootstrap status
  if(bootstrapped>0){
    toast("✓ Water cycle tracker set for "+bootstrapped+" existing customer(s)","ok");
  }
}
function syncIdCounters(){
  var maxO=(D.orders||[]).reduce(function(m,o){return Math.max(m,Number(o.id)||0);},1000);
  var maxI=(D.invoices||[]).reduce(function(m,i){return Math.max(m,Number(i.id)||0);},2000);
  var maxCust=(D.customers||[]).reduce(function(m,cu){return Math.max(m,Number(cu.id)||0);},3000);
  var maxCmp=(D.complaints||[]).reduce(function(m,x){return Math.max(m,Number(x.id)||0);},4000);
  nOId=maxO+1;nIId=maxI+1;nCId=maxCust+1;nCmpId=maxCmp+1;
}
function syncPaymentStatuses(){
  // Fix any order whose payment badge doesn't match its invoice reality
  (D.orders||[]).forEach(function(o){
    var inv=(D.invoices||[]).find(function(i){
      return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+o.id)!==-1;
    });
    if(inv){
      if(inv.paid>=inv.amount){o.paid="Paid";o.amtPaid=inv.paid;}
      else if(inv.paid>0){o.paid="Partial";o.amtPaid=inv.paid;}
      else{o.paid="Unpaid";}
    }else{
      // No invoice: if order was explicitly set Paid at creation, keep it
      // If order is Cancelled, keep as Cancelled
      // Don't change Unpaid orders that just don't have invoices (shouldn't happen but be safe)
      if(o.status!=="Cancelled"&&o.paid!=="Paid"&&o.paid!=="Unpaid"&&o.paid!=="Partial"){
        o.paid="Paid"; // fix any corrupted status
      }
    }
  });
}
