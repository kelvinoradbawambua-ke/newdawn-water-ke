    if(i.notes&&i.notes.indexOf("#")!==-1){
      var match=i.notes.match(/#(\d+)/);
      if(match){
        var oid=parseInt(match[1]);
        var o=D.orders.find(function(x){return x.id===oid;});
        if(!o||o.status==="Cancelled")return false; // order gone or cancelled
      }
    }
    return true;
  }).reduce(function(a,i){return a+(i.amount-i.paid);},0);

function scheduleCloudSync(){
  if(!FB_READY)return;
  if(FB_SYNC_TIMER)clearTimeout(FB_SYNC_TIMER);
  FB_SYNC_TIMER=setTimeout(pushToCloud,800);
}
function pushToCloud(){
  if(!FB_READY||!FB_DOC_REF)return;
  FB_LAST_LOCAL_WRITE=Date.now();
  var payload={
    D:D,USERS:USERS,nOId:nOId,nIId:nIId,nCId:nCId,
    setupDone:FB_SETUP_DONE,
    updatedAt:Date.now()
  };
  FB_DOC_REF.set(JSON.parse(JSON.stringify(payload)),{merge:false}).then(function(){
    var e=el("sts");if(e){e.className="sts saved";e.innerHTML="<i class=\"ti ti-cloud-check\"></i> Synced "+new Date().toLocaleTimeString();}
    var c=el("cloud-status");if(c)c.innerHTML="<i class=\"ti ti-cloud-check\"></i> Online &middot; Live";
  }).catch(function(err){
    var e=el("sts");if(e){e.className="sts dirty";e.innerHTML="<i class=\"ti ti-cloud-off\"></i> Sync failed - retrying";}
    setTimeout(pushToCloud,5000);
  });
}
function startCloudListener(){
  if(!FB_DOC_REF)return;
  if(FB_UNSUB)FB_UNSUB();
  FB_UNSUB=FB_DOC_REF.onSnapshot(function(doc){
    if(!doc.exists){
      var cleanSlate={
        D:{customers:[],stock:[],orders:[],offers:[],invoices:[],routes:[],complaints:[]},
        USERS:[{id:1,name:"Director",role:"director",pin:"1234",ini:"DR",col:"#1a1560"}],
        nOId:1001,nIId:2001,nCId:3001,
        setupDone:false,
        updatedAt:Date.now()
      };
      FB_DOC_REF.set(cleanSlate).then(function(){FB_READY=true;});
      return;
    }
    var data=doc.data();
    var isOwnWrite=Date.now()-FB_LAST_LOCAL_WRITE<800;
    if(!isOwnWrite){
      // Remote update from another device — merge their data in
      if(data.D){
        D=data.D;
        if(!D.routes)D.routes=[];
        if(!D.complaints)D.complaints=[];
        if(!D.offers)D.offers=[];
      }
      if(data.USERS&&data.USERS.length)USERS=data.USERS;
      else USERS=[{id:1,name:"Director",role:"director",pin:"1234",ini:"DR",col:"#1a1560"}];
      FB_SETUP_DONE=data.setupDone===true;
      syncIdCounters();
      syncPaymentStatuses();
    }
    FB_READY=true;
    var c=el("cloud-status");if(c)c.innerHTML="<i class=\"ti ti-cloud-check\"></i> Online &middot; Live";
    if(CU){refreshCurrentPage();}
    else{renderUG();}
  },function(err){
    var c=el("cloud-status");if(c)c.innerHTML="<i class=\"ti ti-cloud-off\"></i> Offline - changes saved locally";
  });
}

function initCloudConnection(cb){
  var done=false;
  function finish(){if(!done){done=true;if(cb)cb();}}
  var timeout=setTimeout(function(){
    FB_READY=true;finish();
  },8000);
  fbAuth.signInAnonymously().then(function(){
    startCloudListener();
    setTimeout(function(){clearTimeout(timeout);FB_READY=true;finish();},1500);

  });

function wizSavePin(){
  var name=el("wiz-dname").value.trim()||"Director";
  var ini=el("wiz-dini").value.trim().toUpperCase()||"DR";
  var p1=el("wiz-pin1").value.trim();
  var p2=el("wiz-pin2").value.trim();
  var err=el("wiz-pin-err");
  if(!p1||p1.length!==4||!/^\d{4}$/.test(p1)){err.textContent="PIN must be exactly 4 digits";return;}
  if(p1!==p2){err.textContent="PINs do not match";return;}
  var director=USERS.find(function(u){return u.role==="director";});
  if(director){director.name=name;director.pin=p1;director.ini=ini.slice(0,2);}
  CU=director;
  var nm=el("um-name");if(nm)nm.textContent=name;
  wizStep(2);
}
function wizAddTeam(){
  var name=el("wiz-tname").value.trim();
  var role=el("wiz-trole").value;
  var pin=el("wiz-tpin").value.trim();
  var ini=el("wiz-tini").value.trim().toUpperCase();
  if(!name||!pin||pin.length!==4||!/^\d{4}$/.test(pin)){toast("Name and 4-digit PIN required","err");return;}
  if(USERS.find(function(u){return u.pin===pin;})){toast("That PIN is already used by another team member","err");return;}
  var cols=["#185FA5","#856404","#534AB7","#155724","#0c5460"];
  if(!ini)ini=(name.split(" ").map(function(w){return w[0]||"";}).join("").toUpperCase()||"XX").slice(0,2);
  WIZ_TEAM.push({id:uid(),name:name,role:role,pin:pin,ini:ini,col:cols[WIZ_TEAM.length%cols.length]});
  el("wiz-tname").value="";el("wiz-tpin").value="";el("wiz-tini").value="";
  wizStep(2);
}
function wizRemTeam(i){WIZ_TEAM.splice(i,1);wizStep(2);}
function wizAddStock(){
  var name=el("wiz-sname").value.trim();
  var size=el("wiz-ssize").value.trim();
  var price=parseFloat(el("wiz-sprice").value)||0;
  var cost=parseFloat(el("wiz-scost").value)||0;
  var qty=parseInt(el("wiz-sqty").value)||0;
  var min=parseInt(el("wiz-smin").value)||10;
  if(!name||!price){toast("Product name and sale price required","err");return;}
  WIZ_STOCK.push({id:uid(),name:name,size:size,price:price,cost:cost,qty:qty,min:min});
  el("wiz-sname").value="";el("wiz-ssize").value="";el("wiz-sprice").value="";el("wiz-scost").value="";el("wiz-sqty").value="";el("wiz-smin").value="";
  wizStep(3);
}

function wizFinish(){
  var btn=el("m-setup") && document.querySelector("#m-setup .btn-gold");
  var body=el("wiz-body");
  if(body)body.innerHTML="<div style=\"text-align:center;padding:40px 20px\"><i class=\"ti ti-loader\" style=\"font-size:32px;color:var(--gd);display:block;margin-bottom:12px\"></i><div style=\"font-size:13px;color:var(--tx2)\">Setting up your system...</div></div>";
  var foot=el("wiz-foot");if(foot)foot.innerHTML="";

  // Build FINAL clean USERS list: Director (already updated in step 1) + wizard team
  var finalUsers=[].concat(USERS.filter(function(u){return u.role==="director";}));
  WIZ_TEAM.forEach(function(u){finalUsers.push(u);});

  // Build FINAL clean D: everything empty except stock entered in wizard
  var freshD={
    customers:[],
    stock:WIZ_STOCK.slice(),
    orders:[],
    offers:[],
    invoices:[],
    routes:[],
    complaints:[]
  };

  // Force-write clean slate to Firestore, overwriting everything
  var cleanPayload={
    D:freshD,
    USERS:finalUsers,
    nOId:1001,nIId:2001,nCId:3001,
    setupDone:true,
    updatedAt:Date.now()
  };

  FB_DOC_REF.set(JSON.parse(JSON.stringify(cleanPayload)),{merge:false}).then(function(){
    // Update local state to match
    D=freshD;
    USERS=finalUsers;
    nOId=1001;nIId=2001;nCId=3001;
    FB_SETUP_DONE=true;
    FB_LAST_LOCAL_WRITE=Date.now();
    syncIdCounters();
    cm("m-setup");
    rDash();
    toast("System is clean and ready. Welcome, "+CU.name+"!");
    if(finalUsers.length>1)setTimeout(function(){toast(finalUsers.length-1+" team member(s) added. Share your app link with them.");},2000);
  }).catch(function(err){
    if(body)body.innerHTML="<div style=\"text-align:center;padding:30px;color:#dc3545\"><i class=\"ti ti-alert-circle\" style=\"font-size:28px;display:block;margin-bottom:10px\"></i>Setup failed: "+err.message+"<br><br><button class=\"btn btn-gold\" onclick=\"wizFinish()\">Retry</button></div>";
    toast("Setup failed — retrying in 3 seconds","err");
    setTimeout(wizFinish,3000);
  });
}

function rDash(){
  var pg=el("pg-dashboard");if(!pg)return;
  var del=D.orders.filter(function(o){return o.status==="Delivered";});
  var rev=del.reduce(function(a,o){return a+o.qty*o.price;},0);
  var cost=del.reduce(function(a,o){return a+o.qty*(o.cost||0);},0);
  var pend=D.orders.filter(function(o){return o.status==="Pending"||o.status==="Processing";}).length;
  var low=D.stock.filter(function(s){return s.qty<=s.min;}).length;
  var td=tday();
  var debts=D.customers.filter(function(c){return custDebt(c.id)>0;});
  var totD=debts.reduce(function(a,c){return a+custDebt(c.id);},0);
  var oCmp=D.complaints.filter(function(c){return c.status!=="Resolved";}).length;
  var yr=new Date().getFullYear();
  var mo=new Date().getMonth();
  var mns=["J","F","M","A","M","J","J","A","S","O","N","D"];
  var mRevs=mns.map(function(_,i){var m2=String(i+1).padStart(2,"0");return del.filter(function(o){return o.date&&o.date.startsWith(yr+"-"+m2);}).reduce(function(a,o){return a+o.qty*o.price;},0);});
  var mMax=Math.max.apply(null,mRevs.concat([1]));
  var alerts=[];
  D.stock.filter(function(s){return s.qty<=s.min;}).forEach(function(s){alerts.push({t:"nw",i:"ti-alert-triangle",m:"Low stock: <strong>"+s.name+"</strong> &mdash; "+s.qty+" left (min "+s.min+")"});});
  if(can("vDebt"))debts.slice(0,3).forEach(function(c){alerts.push({t:"nr",i:"ti-alert-circle",m:"Debt: <strong>"+(can("vPhone")?c.name:maskName(c.name))+"</strong> &mdash; KSh "+custDebt(c.id).toLocaleString()});});
  D.complaints.filter(function(c){return c.status==="Open";}).slice(0,2).forEach(function(c){var cu=D.customers.find(function(x){return x.id===c.cId;});alerts.push({t:"nw",i:"ti-message-report",m:"Complaint: <strong>"+(cu?(can("vPhone")?cu.name:maskName(cu.name)):"?")+"</strong> &mdash; "+c.type});});
  D.orders.filter(function(o){return o.status==="Pending";}).slice(0,3).forEach(function(o){alerts.push({t:"ni",i:"ti-truck",m:"Pending: <strong>#"+o.id+"</strong> &mdash; "+custName(o.cId)+": "+o.qty+"&times; "+o.prod});});
  pg.innerHTML=
    "<div class=\"ph\"><h1>Dashboard</h1><p>Welcome back, "+CU.name+" &middot; "+new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+"</p></div>"+
    "<div class=\"stats\">"+
      "<div class=\"stat sg\"><div class=\"sl\">Revenue</div><div class=\"sv\">"+ksh(rev)+"</div><div class=\"ss\">"+del.length+" delivered</div></div>"+
      "<div class=\"stat sn\"><div class=\"sl\">Gross profit</div><div class=\"sv\">"+(can("vProfit")?"KSh "+(rev-cost).toLocaleString():"<span class=\"hv\">"+String.fromCharCode(8226,8226,8226,8226)+"</span>")+"</div><div class=\"ss\">"+(can("vProfit")&&rev>0?Math.round((rev-cost)/rev*100)+"% margin":"&mdash;&mdash;")+"</div></div>"+
      "<div class=\"stat sb\"><div class=\"sl\">Customers</div><div class=\"sv\">"+D.customers.length+"</div><div class=\"ss\">"+D.customers.filter(function(c){return c.ctype==="Distributor";}).length+" distributors</div></div>"+
      "<div class=\"stat sa\"><div class=\"sl\">Active orders</div><div class=\"sv\">"+pend+"</div><div class=\"ss\">pending / processing</div></div>"+
      "<div class=\"stat sr\"><div class=\"sl\">Total debts</div><div class=\"sv\">"+(can("vDebt")?"KSh "+totD.toLocaleString():"<span class=\"hv\">"+String.fromCharCode(8226,8226,8226,8226)+"</span>")+"</div><div class=\"ss\">"+(can("vDebt")?debts.length+" customers":"&mdash;&mdash;")+"</div></div>"+
      "<div class=\"stat sk\"><div class=\"sl\">Stock alerts</div><div class=\"sv\">"+low+"</div><div class=\"ss\">below minimum</div></div>"+
    "</div>"+
    "<div class=\"g2\">"+
      "<div>"+
        "<div class=\"card\"><div class=\"ct\"><div class=\"ctl\"><i class=\"ti ti-chart-bar\"></i>Monthly revenue "+yr+"</div></div>"+
          (can("vRev")?
            "<div style=\"display:flex;align-items:flex-end;gap:5px;height:88px;margin-top:8px\">"+
            mns.map(function(m,i){return "<div style=\"flex:1;display:flex;flex-direction:column;align-items:center\"><div style=\"width:100%;border-radius:4px 4px 0 0;background:"+(i===mo?"var(--gd)":"var(--nv2)")+";opacity:"+(mRevs[i]>0?1:0.2)+";height:"+Math.round(mRevs[i]/mMax*76+4)+"px\"></div><div style=\"font-size:9px;color:var(--tx2);margin-top:3px\">"+m+"</div></div>";}).join("")+
            "</div>":

        "</div>"+

          (D.stock.length?D.stock.map(function(s){

function delC(id){
  if(!can("dCust"))return;
  var c=D.customers.find(function(x){return x.id===id;});if(!c)return;
  var paidInvs=D.invoices.filter(function(i){return i.cId===id&&i.paid>0;});
  var debt=custDebt(id);
  var msg="Remove "+(can("vPhone")?c.name:"this customer")+"?\n\n";
  if(debt>0)msg+="They have KSh "+debt.toLocaleString()+" outstanding debt — this will be written off.\n\n";
  if(paidInvs.length)msg+=paidInvs.length+" paid invoice(s) will be kept for financial records.\n\n";
  msg+="Their orders and unpaid invoices will be removed. Cannot be undone.";
  if(!confirm(msg))return;
  D.customers=D.customers.filter(function(x){return x.id!==id;});
  D.orders=D.orders.filter(function(o){return o.cId!==id;});
  D.invoices=D.invoices.filter(function(i){if(i.cId!==id)return true;return i.paid>0;});
  D.complaints=D.complaints.filter(function(x){return x.cId!==id;});
  rCusts(undefined,CUST_PAGE);
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();toast("Customer removed"+(paidInvs.length?" — "+paidInvs.length+" paid invoice(s) retained":""));
}
function openPay(cId){
  var c=D.customers.find(function(x){return x.id===cId;});if(!c)return;

  el("pay-cid").value=cId;

  el("pay-date").value=tday();el("pay-amt").value="";el("pay-ref").value="";om("m-pay");
}
function recPay(){
  var cId=parseInt(el("pay-cid").value),amt=parseFloat(el("pay-amt").value)||0;
  if(!amt){toast("Enter amount","err");return;}
  var totalDebt=D.invoices.filter(function(i){return i.cId===cId&&i.paid<i.amount;}).reduce(function(s,i){return s+(i.amount-i.paid);},0);
  if(amt>totalDebt&&totalDebt>0){if(!confirm("Amount KSh "+amt.toLocaleString()+" exceeds total balance of KSh "+totalDebt.toLocaleString()+". Continue?"))return;amt=totalDebt;}
  var rem=amt;
  D.invoices.filter(function(i){return i.cId===cId&&i.paid<i.amount;}).sort(function(a,b){return a.date>b.date?1:-1;}).forEach(function(inv){
    if(rem<=0)return;
    var tap=Math.min(rem,inv.amount-inv.paid);
    inv.paid+=tap;rem-=tap;
    if(!inv.payments)inv.payments=[];
    inv.payments.push({date:el("pay-date").value,amt:tap,method:el("pay-method").value,ref:el("pay-ref").value});
    // Sync payment status back to the linked order
    var ordId=inv.notes&&inv.notes.match(/#(\d+)/);
    if(ordId){
      var o=D.orders.find(function(x){return String(x.id)===ordId[1];});
      if(o){
        if(inv.paid>=inv.amount){o.paid="Paid";}
        else if(inv.paid>0){o.paid="Partial";}
        else{o.paid="Unpaid";}
        o.amtPaid=inv.paid;
      }
    }
  });
  cm("m-pay");
  // Refresh all affected pages
  rCusts(undefined,CUST_PAGE);
  if(el("pg-invoices")&&el("pg-invoices").classList.contains("act"))rInvs(undefined,INV_PAGE);
  if(el("pg-orders")&&el("pg-orders").classList.contains("act"))rOrds(undefined,ORD_PAGE);
  if(el("pg-debts")&&el("pg-debts").classList.contains("act"))rDebts();
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();
  toast("Payment recorded — KSh "+amt.toLocaleString());
}

function saveOrd(){
  if(!D.customers.length){toast("Add a customer first","err");return;}
  if(!D.stock.length){toast("Add a product first","err");return;}
  var cId=parseInt(el("oc").value);
  if(!cId){toast("Please select a customer","err");if(el("oc-search"))el("oc-search").focus();return;}
  var opEl=el("op");var pn=opEl?opEl.value:"";
  if(!pn){toast("Please select a product","err");if(el("op-search"))el("op-search").focus();return;}
  var price=parseInt((opEl?opEl.getAttribute("data-p"):0)||0);
  var qty=parseInt(el("oq").value)||1;
  var editId=el("o-edit-id").value;

  if(editId){
    var o=D.orders.find(function(x){return String(x.id)===String(editId);});
    if(!o){toast("Order not found","err");return;}
    if(o.status==="Delivered"||o.status==="Cancelled"){toast("This order can no longer be fully edited","err");return;}
    var oldStock=D.stock.find(function(s){return s.name===o.prod;});
    var newStock=D.stock.find(function(s){return s.name===pn;});
    if(oldStock===newStock){
      var netChange=qty-o.qty;
      if(netChange>0&&newStock&&newStock.qty<netChange){toast("Only "+newStock.qty+" more units available in stock","err");return;}
      if(newStock)newStock.qty-=netChange;
    }else{
      if(newStock&&newStock.qty<qty){toast("Only "+newStock.qty+" units in stock for "+pn,"err");return;}
      if(oldStock)oldStock.qty+=o.qty;
      if(newStock)newStock.qty-=qty;
    }
    var stCostE=D.stock.find(function(s){return s.name===pn;});
    o.cId=cId;o.prod=pn;o.qty=qty;o.price=price;o.cost=stCostE?stCostE.cost:0;o.date=el("od").value;
    o.driver=el("odrv").value;o.deliver=el("odlvr").value;o.bottle_before=el("obtl").value;
    var amtPaid=parseFloat(el("oamt").value)||0;
    var total=price*qty;
    // Auto-correct payment status based on amount paid
    var payStatus;
    if(amtPaid>=total){payStatus="Paid";}
    else if(amtPaid>0){payStatus="Partial";}
    else{payStatus="Unpaid";}
    o.paid=payStatus;o.amtPaid=amtPaid;
    var linkedInv=D.invoices.find(function(i){return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+o.id)!==-1;});
    if(payStatus!=="Paid"){
      if(linkedInv){
        linkedInv.amount=price*qty;
        if(amtPaid>linkedInv.paid){
          var diff=amtPaid-linkedInv.paid;
          if(!linkedInv.payments)linkedInv.payments=[];
          linkedInv.payments.push({date:tday(),amt:diff,method:"Cash",ref:"Order edit adjustment"});
        }
        linkedInv.paid=amtPaid;
      }else{
        D.invoices.push({id:nIId++,cId:cId,amount:price*qty,paid:amtPaid,due:o.date,notes:"Order #"+o.id,date:tday(),payments:amtPaid>0?[{date:tday(),amt:amtPaid,method:"Cash",ref:"Order edit"}]:[]});
      }
    }else if(linkedInv){
      linkedInv.amount=price*qty;linkedInv.paid=price*qty;
    }
    cm("m-o");rOrds(undefined,ORD_PAGE);dirty();toast("Order #"+o.id+" updated");
    return;
  }

  var st=D.stock.find(function(s){return s.name===pn;});
  if(st&&st.qty<qty){toast("Only "+st.qty+" units in stock","err");return;}
  if(st)st.qty-=qty;
  var total=price*qty;
  var amtPaid=can("mPaid")?(parseFloat(el("oamt").value)||0):0;
  var payStatus=can("mPaid")?el("opay").value:"Unpaid";
  // Auto-correct payment status based on amount paid
  if(amtPaid>=total){payStatus="Paid";}
  else if(amtPaid>0){payStatus="Partial";}
  else{payStatus="Unpaid";}
  var newOrdId=nOId++;
  var stCost=D.stock.find(function(s){return s.name===pn;});var costAtSale=stCost?stCost.cost:0;
  D.orders.push({id:newOrdId,cId:cId,prod:pn,qty:qty,price:price,cost:costAtSale,date:el("od").value,status:"Pending",paid:payStatus,amtPaid:amtPaid,driver:el("odrv").value,deliver:el("odlvr").value,bottle_before:el("obtl").value,bottle_after:null,notes:""});
  if(payStatus!=="Paid"){
    D.invoices.push({id:nIId++,cId:cId,amount:total,paid:amtPaid,due:el("od").value,notes:"Order #"+newOrdId,date:tday(),payments:amtPaid>0?[{date:tday(),amt:amtPaid,method:"Cash",ref:"Order #"+newOrdId}]:[]});
  }
  cm("m-o");rOrds(undefined,ORD_PAGE);dirty();toast("Order #"+newOrdId+" placed");
}

function completeDlv(){
  var oid=parseInt(el("dlv-oid").value);var o=D.orders.find(function(x){return x.id===oid;});if(!o)return;
  o.status="Delivered";o.bottle_after=el("dlv-btl").value;
  if(can("mPaid")){
    var amt=parseFloat(el("dlv-amt").value)||0;
    var inv=D.invoices.find(function(i){return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+oid)!==-1;});
    if(amt>0&&inv){
      inv.paid=Math.min(inv.amount,inv.paid+amt);
      if(!inv.payments)inv.payments=[];
      inv.payments.push({date:tday(),amt:amt,method:"Cash",ref:"Delivery #"+oid});
    }
    // Auto-correct payment status from invoice
    if(inv){
      if(inv.paid>=inv.amount){o.paid="Paid";o.amtPaid=inv.paid;}
      else if(inv.paid>0){o.paid="Partial";o.amtPaid=inv.paid;}
      else{o.paid="Unpaid";}
    }else{
      // No invoice — use dropdown value directly
      var total=o.qty*o.price;
      if(amt>=total){o.paid="Paid";o.amtPaid=amt;}
      else if(amt>0){o.paid="Partial";o.amtPaid=amt;}
    }
  }else{
    o.paid=o.paid||"Unpaid";
  }
  if(el("dlv-notes").value)o.notes=el("dlv-notes").value;
  cm("m-dlv");rOrds(undefined,ORD_PAGE);rDel();
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();toast("Delivery completed!");
}
function delO(id){
  if(!can("dOrd"))return;
  var o=D.orders.find(function(x){return x.id===id;});if(!o)return;
  var hasPaid=D.invoices.some(function(i){return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+id)!==-1&&i.paid>0;});
  var msg=hasPaid?
    "Delete order #"+id+"?\n\nThis order has payments on record. The invoice will be kept for your financial records, but the order will be removed.":
    "Delete order #"+id+"? The linked invoice will also be removed.";
  if(!confirm(msg))return;
  // Restore stock
  var st=D.stock.find(function(s){return s.name===o.prod;});
  if(st&&o.status!=="Delivered"&&o.status!=="Cancelled")st.qty+=o.qty;
  // Remove order
  D.orders=D.orders.filter(function(x){return x.id!==id;});
  // Remove unpaid invoices only — keep paid ones for records
  D.invoices=D.invoices.filter(function(i){
    var linked=i.notes&&i.notes.indexOf("#"+id)!==-1;
    if(linked&&i.paid<=0)return false;
    return true;
  });
  rOrds(undefined,ORD_PAGE);
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();toast("Order #"+id+" deleted");
}

function cancelO(id){
  if(!can("eOrd"))return;
  var o=D.orders.find(function(x){return x.id===id;});if(!o)return;
  if(o.status==="Cancelled"){toast("Already cancelled");return;}
  if(o.status==="Delivered"){toast("Cannot cancel a delivered order — delete it if needed","err");return;}
  var inv=D.invoices.find(function(i){return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+id)!==-1;});
  var hasPaid=inv&&inv.paid>0;
  var msg=hasPaid?
    "Cancel order #"+id+"?\n\nKSh "+inv.paid.toLocaleString()+" has already been paid. The invoice will stay with the paid amount recorded. Stock will be restored.":
    "Cancel order #"+id+"? Stock will be restored and the invoice removed.";
  if(!confirm(msg))return;
  // Restore stock
  var st=D.stock.find(function(s){return s.name===o.prod;});
  if(st)st.qty+=o.qty;
  // Update order status
  o.status="Cancelled";
  o.paid=hasPaid?"Partial":"Cancelled";
  // Handle invoice
  if(inv){
    if(hasPaid){
      // Keep invoice but zero the balance — only owed what was paid
      inv.amount=inv.paid;
    }else{
      // Remove fully unpaid invoice
      D.invoices=D.invoices.filter(function(i){return i.id!==inv.id;});
    }
  }
  rOrds(undefined,ORD_PAGE);
  if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
  dirty();toast("Order #"+id+" cancelled — stock restored");
}

function saveInv(){

function payI(id){
  var i=D.invoices.find(function(x){return x.id===id;});

    if(!i.payments)i.payments=[];

    // Sync linked order payment status

    if(ordId){var o=D.orders.find(function(x){return String(x.id)===ordId[1];});if(o){o.paid="Paid";o.amtPaid=i.amount;}}

function saveU(){
  var n=el("un").value.trim();if(!n){toast("Name required","err");return;}
  var p=String(el("upin").value||"").replace(/[^0-9]/g,"").slice(0,4);
  if(p.length!==4){toast("PIN must be 4 digits e.g. 1234","err");return;}
  var role=el("ur").value;if(!R[role]){toast("Invalid role","err");return;}
  var ini=(el("uini").value||"").trim().toUpperCase().slice(0,2);
  if(!ini){var w=n.split(" ");ini=(w[0][0]+(w[1]?w[1][0]:w[0][1]||"X")).toUpperCase();}
  var cols=["#1a1560","#185FA5","#856404","#534AB7","#c0392b","#8e44ad","#16a085","#e67e22"];
  USERS.push({id:uid(),name:n,role:role,pin:p,ini:ini.slice(0,2),col:cols[USERS.length%cols.length]});
  el("un").value="";el("upin").value="";el("uini").value="";
  cm("m-u");rUsers();dirty();toast(n+" added as "+R[role].label);
}

/* ── EMAIL BACKUP VIA EMAILJS ── */
function ejConfigured(){return EJ_PUBLIC_KEY&&EJ_SERVICE_ID&&EJ_TEMPLATE_ID&&EJ_TO_EMAIL;}
function saveEJConfig(){
  EJ_PUBLIC_KEY=el("ej-pk").value.trim();
  EJ_SERVICE_ID=el("ej-sid").value.trim();
  EJ_TEMPLATE_ID=el("ej-tid").value.trim();
  EJ_TO_EMAIL=el("ej-email").value.trim();
  // Strip accidental full URLs — extract just the ID
  if(EJ_TEMPLATE_ID.indexOf("/")!==-1){
    var parts=EJ_TEMPLATE_ID.split("/");
    EJ_TEMPLATE_ID=parts[parts.length-1]||parts[parts.length-2];
    if(EJ_TEMPLATE_ID==="content")EJ_TEMPLATE_ID=parts[parts.length-2];
  }
  localStorage.setItem("nd_ej_pk",EJ_PUBLIC_KEY);
  localStorage.setItem("nd_ej_sid",EJ_SERVICE_ID);
  localStorage.setItem("nd_ej_tid",EJ_TEMPLATE_ID);
  localStorage.setItem("nd_ej_email",EJ_TO_EMAIL);
  if(ejConfigured()){
    emailjs.init({publicKey:EJ_PUBLIC_KEY});
    toast("Email backup configured — template: "+EJ_TEMPLATE_ID);
    scheduleEmailBackup();
  }else{toast("Fill all fields to enable email backup","err");}
  rExcel();
}
function sendEmailBackup(manual){
  if(!ejConfigured()){if(manual)toast("Set up email backup first in Data tab","err");return;}
  var today=new Date().toISOString().split("T")[0];
  if(!manual&&EJ_LAST_SENT===today){return;}
  toast(manual?"Building backup & sending email...":"Sending scheduled midnight backup...");
  var wb=buildBackupWB();
  var wbout=XLSX.write(wb,{bookType:"xlsx",type:"base64"});
  var filename="NewDawn_Backup_"+today+".xlsx";
  var summary={
    customers:D.customers.length,
    orders:D.orders.length,
    pending:D.orders.filter(function(o){return o.status==="Pending"||o.status==="Processing";}).length,
    revenue:"KSh "+(D.orders.filter(function(o){return o.status==="Delivered";}).reduce(function(s,o){return s+o.qty*o.price;},0)).toLocaleString(),
    debt:"KSh "+(D.invoices.reduce(function(s,i){return s+Math.max(0,i.amount-i.paid);},0)).toLocaleString(),
    stock:D.stock.length,
    complaints:D.complaints.filter(function(c){return c.status!=="Resolved";}).length
  };
  emailjs.send(EJ_SERVICE_ID,EJ_TEMPLATE_ID,{
    backup_date:today,
    customers:summary.customers,
    orders:summary.orders,
    pending:summary.pending,
    revenue:summary.revenue,
    debt:summary.debt,
    stock:summary.stock,
    complaints:summary.complaints,
    excel_attachment:"data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,"+wbout,
    filename:filename
  }).then(function(){
    EJ_LAST_SENT=today;
    localStorage.setItem("nd_ej_last",today);
    toast("Backup email sent with Excel attached");
    var el2=el("ej-last");if(el2)el2.textContent="Last sent: "+today+" at "+new Date().toLocaleTimeString();
  }).catch(function(err){
    var msg=err.text||err.message||JSON.stringify(err)||"unknown error";
    toast("Email failed: "+msg,"err");
    console.error("EmailJS error — Service:"+EJ_SERVICE_ID+" Template:"+EJ_TEMPLATE_ID);
  });
}
function scheduleEmailBackup(){
  if(EJ_TIMER)clearInterval(EJ_TIMER);
  if(!ejConfigured())return;
  EJ_TIMER=setInterval(function(){
    var now=new Date();
    if(now.getHours()===0&&now.getMinutes()===0){
      sendEmailBackup(false);
    }
  },60000);
  console.log("Email backup scheduler running — will send at midnight");
}

/* ───────────────────────────────────────────────────
   AUTO-SAVE SYSTEM
   Layer 1: File System Access API (Chrome/Edge desktop) - true silent overwrite of a chosen file
   Layer 2: Browser local storage snapshot (works on ALL devices incl. phones) - safety net per-device
   Layer 3: Manual Save/Restore/Merge - for moving data between devices (Excel)
   ─────────────────────────────────────────────────── */
var AS_HANDLE=null;       // File System Access API handle, once user picks a file
var AS_TIMER=null;
var AS_INTERVAL_MS=60000; // 1 minute
var AS_SUPPORTED=(typeof window.showSaveFilePicker==="function");

function lsKey(){return "newdawn_autosave_"+(CU?CU.role:"shared");}

function autoSaveLocal(){
  try{
    var snapshot={D:D,USERS:USERS,nOId:nOId,nIId:nIId,nCId:nCId,ts:new Date().toISOString()};
    localStorage.setItem("newdawn_autosave_shared",JSON.stringify(snapshot));
    return true;
  }catch(e){return false;}
}
function autoSaveCheckLocal(){
  try{
    var raw=localStorage.getItem("newdawn_autosave_shared");
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

async function pickAutoSaveFile(){
  if(!AS_SUPPORTED){
    toast("Auto-overwrite to a chosen file needs Chrome or Edge on a laptop. Using safe local auto-save instead.","warn");
    return;
  }
  try{
    AS_HANDLE=await window.showSaveFilePicker({
      suggestedName:"NewDawn_AutoSave.xlsx",
      types:[{description:"Excel Workbook",accept:{"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet":[".xlsx"]}}]
    });
    var ok=await writeAutoSaveFile();
    if(ok){
      toast("Auto-save file linked. Saving every 1 minute automatically.");
      updateAutoSaveUI(true);
    }
  }catch(err){
    if(err && err.name==="AbortError")return;
    toast("Could not set up auto-save file: "+(err&&err.message?err.message:"unknown error"),"err");
  }
}
async function writeAutoSaveFile(){
  if(!AS_HANDLE)return false;
  try{
    var wb=buildBackupWB();
    var out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
    var writable=await AS_HANDLE.createWritable();
    await writable.write(out);
    await writable.close();
    return true;
  }catch(err){
    toast("Auto-save write failed - will retry next cycle","warn");
    return false;
  }
}
function stopAutoSaveFile(){
  AS_HANDLE=null;
  updateAutoSaveUI(false);
  toast("Auto-overwrite file disconnected. Local safety auto-save continues.");
}
function updateAutoSaveUI(linked){
  var b=el("aslink");
  if(b){
    if(linked){
      b.innerHTML="<i class=\"ti ti-link\"></i> Auto-save file linked";
      b.className="btn btn-sm btn-grn";
      b.setAttribute("onclick","stopAutoSaveFile()");
    }else{
      b.innerHTML="<i class=\"ti ti-link-plus\"></i> Link a file for auto-overwrite";
      b.className="btn btn-sm btn-navy";
      b.setAttribute("onclick","pickAutoSaveFile()");
    }
  }
  var ind2=el("as-indicator2");
  if(ind2)ind2.innerHTML=linked?"<i class=\"ti ti-device-floppy\"></i> Overwriting file every 1 min":"<i class=\"ti ti-refresh\"></i> Running (local safety copy)";
}
function startAutoSaveLoop(){
  if(AS_TIMER)clearInterval(AS_TIMER);
  AS_TIMER=setInterval(async function(){
    autoSaveLocal();
    if(AS_HANDLE){
      await writeAutoSaveFile();
    }
    var l=el("lsl");
    if(l)l.innerHTML="Auto-saved at "+new Date().toLocaleTimeString()+(AS_HANDLE?" (file overwritten)":" (local safety copy)");
    var asind=el("as-indicator");
    if(asind)asind.innerHTML="<i class=\"ti ti-refresh\"></i> Last auto-save: "+new Date().toLocaleTimeString();
  },AS_INTERVAL_MS);
}
function stopAutoSaveLoop(){if(AS_TIMER){clearInterval(AS_TIMER);AS_TIMER=null;}}

      else if(o)D.orders=[];

      else if(s)D.stock=[];

      else if(of)D.offers=[];

      var iv=get("Invoices");if(iv&&iv.length)D.invoices=iv.map(function(r){var pays=[];if(r.LastPayAmt&&r.LastPayAmt>0)pays.push({date:r.LastPayDate||tday(),amt:r.LastPayAmt,method:r.LastPayMethod||"Cash",ref:"Restored"});return{id:(r.ID!==undefined&&r.ID!==null&&r.ID!=="")?r.ID:Date.now()+Math.floor(Math.random()*1000),cId:r.CustomerID||0,amount:r.Amount||0,paid:r.Paid||0,due:r.DueDate||"",notes:r.Notes||"",date:r.IssueDate||tday(),payments:pays};});

function syncIdCounters(){
  var maxO=D.orders.reduce(function(m,o){return Math.max(m,Number(o.id)||0);},1000);
  var maxI=D.invoices.reduce(function(m,i){return Math.max(m,Number(i.id)||0);},2000);
  var maxC=D.complaints.reduce(function(m,c){return Math.max(m,Number(c.id)||0);},3000);
  nOId=maxO+1;nIId=maxI+1;nCId=maxC+1;
}
function syncPaymentStatuses(){
  // Fix any order whose payment badge doesn't match its invoice reality
  D.orders.forEach(function(o){
    var inv=D.invoices.find(function(i){
      return i.cId===o.cId&&i.notes&&i.notes.indexOf("#"+o.id)!==-1;
    });
    if(inv){
      if(inv.paid>=inv.amount){o.paid="Paid";o.amtPaid=inv.paid;}
      else if(inv.paid>0){o.paid="Partial";o.amtPaid=inv.paid;}
      else{o.paid="Unpaid";}
    }else{
      // No invoice: if order was explicitly set Paid at creation, keep it
      // If order is Cancelled, keep as Cancelled
      // Don't change Unpaid orders that just don't have invoices (shouldn't happen but be safe)
      if(o.status!=="Cancelled"&&o.paid!=="Paid"&&o.paid!=="Unpaid"&&o.paid!=="Partial"){
        o.paid="Paid"; // fix any corrupted status
      }
    }
  });
}

function mergeXL(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      function get(n){return wb.SheetNames.indexOf(n)!==-1?XLSX.utils.sheet_to_json(wb.Sheets[n]):[]; }
      function hasId(v){return v!==undefined&&v!==null&&v!=="";}
      var rep={customers:{added:0,skipped:0},orders:{added:0,skipped:0},invoices:{added:0,skipped:0},complaints:{added:0,skipped:0},stock:{conflicts:[]}};

      get("Customers").forEach(function(r){
        if(!hasId(r.ID)||!r.Name)return;
        if(D.customers.find(function(x){return x.id===r.ID;})){rep.customers.skipped++;return;}
        D.customers.push({id:r.ID,name:r.Name||"",phone:r.Phone||"",phone2:r.Phone2||"",idno:r.IDNo||"",estate:r.Estate||"",court:r.Court||"",house:r.HouseNo||"",htype:r.HouseType||"House",road:r.Road||"",zone:r.Zone||"",ctype:r.Type||"Residential",credit:r.CreditLimit||0,notes:r.Notes||"",created:r.Created||""});
        rep.customers.added++;
      });
      get("Orders").forEach(function(r){
        if(!hasId(r.ID))return;
        if(D.orders.find(function(x){return x.id===r.ID;})){rep.orders.skipped++;return;}
        D.orders.push({id:r.ID,cId:r.CustomerID||0,prod:r.Product||"",qty:r.Qty||0,price:r.UnitPrice||0,date:r.Date||"",status:r.Status||"Pending",paid:r.Payment||"Unpaid",amtPaid:r.AmtPaid||0,driver:r.Driver||"",deliver:r.DeliveryAddr||"",bottle_before:r.BottleBefore||"Good",bottle_after:r.BottleAfter||null,notes:r.Notes||""});
        rep.orders.added++;
      });
      get("Invoices").forEach(function(r){
        if(!hasId(r.ID))return;
        var ex=D.invoices.find(function(x){return x.id===r.ID;});
        if(ex){
          if(r.Paid>ex.paid){var diff=r.Paid-ex.paid;if(!ex.payments)ex.payments=[];ex.payments.push({date:r.LastPayDate||tday(),amt:diff,method:r.LastPayMethod||"Cash",ref:"Merged"});ex.paid=r.Paid;}
          rep.invoices.skipped++;return;
        }
        D.invoices.push({id:r.ID,cId:r.CustomerID||0,amount:r.Amount||0,paid:r.Paid||0,due:r.DueDate||"",notes:r.Notes||"",date:r.IssueDate||tday(),payments:r.Paid>0?[{date:r.LastPayDate||tday(),amt:r.Paid,method:r.LastPayMethod||"Cash",ref:"Merged"}]:[]});
        rep.invoices.added++;
      });
      get("Complaints").forEach(function(r){
        if(!hasId(r.ID))return;
        if(D.complaints.find(function(x){return x.id===r.ID;})){rep.complaints.skipped++;return;}
        D.complaints.push({id:r.ID,cId:r.CustomerID||0,type:r.Type||"Other",details:r.Details||"",action:r.ActionTaken||"",status:r.Status||"Open",date:r.Date||tday()});
        rep.complaints.added++;
      });
      get("Stock").forEach(function(r){
        if(!hasId(r.ID)||!r.Name)return;
        var ex=D.stock.find(function(x){return x.id===r.ID;});
        if(ex){if(ex.qty!==r.InStock)rep.stock.conflicts.push({name:r.Name,master:ex.qty,incoming:r.InStock});return;}
        D.stock.push({id:r.ID,name:r.Name||"",size:r.Size||"",price:r.SalePrice||0,cost:r.CostPrice||0,qty:r.InStock||0,min:r.MinLevel||10});
      });
      get("Offers").forEach(function(r){
        if(!hasId(r.ID))return;
        if(!D.offers.find(function(x){return x.id===r.ID;}))D.offers.push({id:r.ID,title:r.Title||"",disc:r.Discount||0,minqty:r.MinQty||1,prod:r.Product||"",start:r.StartDate||"",end:r.EndDate||"",desc:r.Description||"",active:r.Active==="Yes"});
      });

      syncIdCounters();

      var total=rep.customers.added+rep.orders.added+rep.invoices.added+rep.complaints.added;
      var hasC=rep.stock.conflicts.length>0;
      var html="<div style=\"background:#f0fdf4;border:1.5px solid #27ae60;border-radius:10px;padding:14px 16px;margin-top:4px\">"+
        "<div style=\"font-weight:800;font-size:13px;color:#155724;margin-bottom:10px;display:flex;align-items:center;gap:7px\"><i class=\"ti ti-circle-check\" style=\"font-size:16px\"></i>Merge complete &mdash; "+total+" new records added</div>"+
        "<table style=\"width:100%;font-size:12px;border-collapse:collapse\">"+
          "<tr style=\"background:#dcfce7\"><th style=\"padding:5px 8px;text-align:left\">Sheet</th><th style=\"padding:5px 8px;text-align:center\">Added</th><th style=\"padding:5px 8px;text-align:center\">Skipped</th></tr>"+
          "<tr><td style=\"padding:5px 8px;font-weight:600\">Customers</td><td style=\"text-align:center;color:#27ae60;font-weight:700\">"+rep.customers.added+"</td><td style=\"text-align:center;color:var(--tx2)\">"+rep.customers.skipped+"</td></tr>"+
          "<tr style=\"background:#f8f9fa\"><td style=\"padding:5px 8px;font-weight:600\">Orders</td><td style=\"text-align:center;color:#27ae60;font-weight:700\">"+rep.orders.added+"</td><td style=\"text-align:center;color:var(--tx2)\">"+rep.orders.skipped+"</td></tr>"+
          "<tr><td style=\"padding:5px 8px;font-weight:600\">Invoices</td><td style=\"text-align:center;color:#27ae60;font-weight:700\">"+rep.invoices.added+"</td><td style=\"text-align:center;color:var(--tx2)\">"+rep.invoices.skipped+"</td></tr>"+
          "<tr style=\"background:#f8f9fa\"><td style=\"padding:5px 8px;font-weight:600\">Complaints</td><td style=\"text-align:center;color:#27ae60;font-weight:700\">"+rep.complaints.added+"</td><td style=\"text-align:center;color:var(--tx2)\">"+rep.complaints.skipped+"</td></tr>"+
        "</table>"+
        (hasC?"<div style=\"background:#fff8e1;border:1px solid #f39c12;border-radius:8px;padding:10px 13px;margin-top:10px\">"+
          "<div style=\"font-weight:700;color:#856404;margin-bottom:7px;font-size:12px\"><i class=\"ti ti-alert-triangle\"></i> Stock qty conflicts &mdash; review manually:</div>"+
          rep.stock.conflicts.map(function(s){
            return "<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:6px 8px;background:#fff;border-radius:6px;font-size:12px\">"+
              "<span style=\"font-weight:600\">"+s.name+"</span>"+
              "<span>Master: <strong>"+s.master+"</strong> &nbsp;|&nbsp; Incoming: <strong>"+s.incoming+"</strong> &nbsp;"+
              "<button class=\"btn btn-xs btn-gold\" onclick=\"resStock('"+s.name+"',"+s.incoming+")\">Use incoming</button> "+
              "<button class=\"btn btn-xs\" onclick=\"resStock('"+s.name+"',"+s.master+")\">Keep master</button></span>"+
            "</div>";
          }).join("")+
        "</div>":"")+"</div>";

      el("merge-result").innerHTML=html;
      dirty();
      if(el("pg-dashboard")&&el("pg-dashboard").classList.contains("act"))rDash();
      toast(total+" records merged");
    }catch(err){
      el("merge-result").innerHTML="<div style=\"background:#fff0f0;border:1px solid #e74c3c;border-radius:10px;padding:13px;color:#721c24;font-size:12px\"><i class=\"ti ti-alert-circle\"></i> Failed: "+err.message+"</div>";
      toast("Merge failed","err");
    }
  };
  reader.onerror=function(){
    el("merge-result").innerHTML="<div style=\"background:#fff0f0;border:1px solid #e74c3c;border-radius:10px;padding:13px;color:#721c24;font-size:12px\">Could not read file.</div>";
    toast("File read error","err");
  };
  reader.readAsArrayBuffer(file);input.value="";
}
function resStock(name,qty){
  var s=D.stock.find(function(x){return x.name===name;});
  if(s){s.qty=qty;dirty();toast(name+" qty set to "+qty);}
}

function loadScript(src,cb){
  var s=document.createElement("script");
  s.src=src;s.onload=function(){cb(null);};
  s.onerror=function(){cb(new Error(src));};
  document.head.appendChild(s);
}
function loadFirebase(cb){
  // Three independent CDNs tried in sequence
  var attempts=[
    [
      "https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.min.js",
      "https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-auth-compat.min.js",
      "https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-firestore-compat.min.js"
    ],
    [
      "https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"
    ],
    [
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js",
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js",
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"
    ]
  ];
  var ai=0;
  function trySet(){
    if(ai>=attempts.length){cb(new Error("All CDNs failed. Check internet connection."));return;}
    var urls=attempts[ai++];
    var ui=0;
    function nextScript(){
      if(ui>=urls.length){cb(null);return;}
      loadScript(urls[ui++],function(err){
        if(err){trySet();}else{nextScript();}
      });
    }
    nextScript();
  }
  trySet();
}
window.addEventListener("load",function(){
  renderConnecting();
  loadFirebase(function(err){
    if(err){
      var r=document.getElementById("root");
      if(r)r.innerHTML="<div class=\"lscreen\"><div class=\"lbox\" style=\"text-align:center\">"+
        "<div style=\"font-size:40px;margin-bottom:14px\">📶</div>"+
        "<div style=\"font-weight:700;color:#dc3545;margin-bottom:10px;font-size:15px\">No Internet Connection</div>"+
        "<div style=\"font-size:12px;color:#666;line-height:1.9;margin-bottom:20px\">"+
          "Could not load the app.<br>"+
          "Please check your internet connection and try again.<br><br>"+
          "<span style=\"font-size:11px;color:#aaa\">Tried 3 CDNs — all failed. WiFi or mobile data required.</span>"+
        "</div>"+
        "<button onclick=\"location.reload()\" style=\"padding:12px 28px;background:#1a1560;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700\">Try Again</button>"+
        "</div></div>";
      return;
    }
    try{
      firebase.initializeApp(firebaseConfig);
      fbAuth=firebase.auth();
      fbDb=firebase.firestore();
      fbDb.enableMultiTabIndexedDbPersistence&&fbDb.enableMultiTabIndexedDbPersistence().catch(function(){
        fbDb.enableIndexedDbPersistence&&fbDb.enableIndexedDbPersistence().catch(function(){});
      });
      FB_DOC_REF=fbDb.collection("newdawn").doc("main");
    }catch(e){
      var r=document.getElementById("root");
      if(r)r.innerHTML="<div class=\"lscreen\"><div class=\"lbox\" style=\"text-align:center\">"+
        "<div style=\"font-size:40px;margin-bottom:14px\">⚠️</div>"+
        "<div style=\"font-weight:700;color:#dc3545;margin-bottom:10px\">Setup Error</div>"+
        "<div style=\"font-size:12px;color:#666;line-height:1.8;margin-bottom:20px\">"+e.message+"</div>"+
        "<button onclick=\"location.reload()\" style=\"padding:12px 28px;background:#1a1560;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700\">Refresh</button>"+
        "</div></div>";
      return;
    }
    initCloudConnection(function(){
      renderLogin();
    });
  });
});
